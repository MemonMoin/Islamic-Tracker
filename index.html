<title>Daily Tracker</title>
<style>


:root {
  --bg:       #0f1a12;
  --card:     #162019;
  --card2:    #1c2a1f;
  --border:   #2a3d2e;
  --text:     #e2ede4;
  --muted:    #6b8a70;
  --gold:     #c8a84b;
  --accent:   #4caf70;
  --teal:     #56c9a0;
  --red:      #e05c5c;
  --green:    #4caf70;
  --weekend:  #e07070;
  --hi-bg:    rgba(76,175,112,0.10);
  --hi-brd:   #4caf70;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.frame {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 0 0 70px;
}

/* ── Top bar ── */
.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px 10px;
  margin-bottom: 10px;
}
.date-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.date-text { font-family: Georgia, serif; font-size: 19px; font-weight: 700; }
.day-name { text-decoration: underline; font-style: italic; }
.sep { color: var(--muted); }
.day-type { font-weight: 600; font-size: 17px; }
.day-type.weekday { color: var(--accent); }
.day-type.weekend { color: var(--weekend); }
.hijri { font-size: 11px; color: var(--muted); margin-top: 3px; }
.location-line { font-size: 11px; color: var(--teal); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
.clock-row { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
.live-clock { font-size: 12px; color: var(--muted); }

.streak-badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(200,168,75,0.12);
  border: 1px solid rgba(200,168,75,0.3);
  border-radius: 20px; padding: 3px 10px;
  font-size: 12px; color: var(--gold); font-weight: 600;
}

/* ── Quote ── */
.quote-box {
  margin: 0 12px 10px;
  background: linear-gradient(135deg, var(--card2), var(--card));
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  position: relative;
  overflow: hidden;
}
.quote-box::before {
  content: '"';
  position: absolute; top: -8px; left: 10px;
  font-family: Georgia, serif;
  font-size: 60px; color: rgba(76,175,112,0.12);
  line-height: 1;
}
.quote-text { font-family: Georgia, serif; font-size: 13px; font-style: italic; line-height: 1.6; color: var(--text); position: relative; }
.quote-src { font-size: 10px; color: var(--muted); margin-top: 5px; text-align: right; }

/* ── Countdown ── */
.countdown-box {
  margin: 0 12px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.cd-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.cd-prayer { font-size: 13px; font-weight: 600; color: var(--accent); margin-top: 2px; }
.cd-time { font-family: Georgia, serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }

/* ── Section ── */
.section { margin: 0 12px 10px; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
.sec-hdr { padding: 9px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.edit-btn { font-size: 11px; color: var(--teal); background: none; border: none; cursor: pointer; padding: 0; letter-spacing: 0; text-transform: none; font-family: -apple-system, sans-serif; }
.sec-hdr-right { display: flex; align-items: center; gap: 10px; }
.namaz-count { font-size: 11px; color: var(--accent); font-weight: 600; letter-spacing: 0; text-transform: none; }

/* ── Progress ── */
.prog-bar { height: 3px; background: var(--border); }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--accent)); transition: width 0.4s ease; border-radius: 0 2px 2px 0; }

/* ── Namaz rows ── */
.namaz-row { display: flex; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; gap: 10px; }
.namaz-row:last-child { border-bottom: none; }
.namaz-row.cur-namaz { background: var(--hi-bg); border-left: 3px solid var(--hi-brd); }
.namaz-row.cur-namaz .namaz-nm { color: var(--accent); font-weight: 600; }
.namaz-nm { flex: 1; font-size: 14px; }
.opt-lbl { color: var(--teal); }
.namaz-t { font-size: 11px; color: var(--muted); }
.namaz-t.cur { color: var(--gold); font-weight: 600; }
.n-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; flex-shrink: 0; }
.st-pending { background: rgba(107,138,112,0.15); color: var(--muted); }
.st-prayed  { background: rgba(76,175,112,0.15);  color: var(--green); }
.st-missed  { background: rgba(224,92,92,0.15);   color: var(--red); }
.pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; animation: pulse 1.4s infinite; }

/* Hide scrollbar */
html, body { scrollbar-width: none; -ms-overflow-style: none; }
html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.65)} }

/* ── Dhikr ── */
.counter-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.counter-row:last-child { border-bottom: none; }
.c-label { flex: 1; min-width: 0; }
.c-arabic { font-family: Georgia, serif; font-size: 13px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.c-meaning { font-size: 10px; color: var(--muted); font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.c-done .c-arabic { color: var(--muted); text-decoration: line-through; }
.c-controls { display: flex; align-items: center; gap: 0; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; flex-shrink: 0; }
.c-btn {
  background: none; border: none; color: var(--text);
  font-size: 26px; cursor: pointer; line-height: 1;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  -webkit-user-select: none; user-select: none;
  transition: background 0.12s;
}
.c-btn:active { background: rgba(255,255,255,0.06); }
.c-val-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 46px; padding: 0 2px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
.c-val { font-family: Georgia, serif; font-size: 17px; font-weight: 700; color: var(--gold); line-height: 1; }
.c-val.done { color: var(--green); }
.c-tgt { font-size: 9px; color: var(--muted); margin-top: 1px; }

/* ── Tasks ── */
.task-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
.task-row:last-child { border-bottom: none; }
.radio { width: 23px; height: 23px; border-radius: 50%; border: 2px solid var(--muted); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.task-row.done .radio { border-color: var(--green); background: var(--green); }
.task-row.done .radio::after { content:''; width:7px; height:5px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg) translateY(-1px); }
.task-lbl { font-size: 14px; flex: 1; }
.task-row.done .task-lbl { color: var(--muted); text-decoration: line-through; }

/* ── Bottom ── */
.bottom { text-align: center; padding: 12px 20px 0; }
.hint { font-size: 10px; color: var(--muted); margin-bottom: 10px; }
.reset-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--muted); font-size: 12px; padding: 6px 20px; border-radius: 20px; cursor: pointer; font-family: -apple-system, sans-serif; }
.confirm-box { display:none; margin:10px 0 0; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 16px; font-size:13px; text-align:center; }
.confirm-box.vis { display:block; }
.confirm-actions { display:flex; gap:10px; margin-top:10px; justify-content:center; }

<script>
// ── Quotes ────────────────────────────────────────────────────────
const QUOTES = [
  { text: "Verily, with hardship comes ease.", src: "Quran 94:5" },
  { text: "Allah does not burden a soul beyond that it can bear.", src: "Quran 2:286" },
  { text: "And whoever puts their trust in Allah, He will be enough for them.", src: "Quran 65:3" },

  { text: "Speak good or remain silent.", src: "Prophet Muhammad ﷺ" },
  { text: "The best of people are those who are most beneficial to people.", src: "Prophet Muhammad ﷺ" },

  { text: "None of you truly believes until he loves for his brother what he loves for himself.", src: "Prophet Muhammad ﷺ" },

  { text: "Take benefit of five before five: your youth before your old age, your health before your sickness, your wealth before your poverty, your free time before your preoccupation, and your life before your death.", src: "Prophet Muhammad ﷺ" },
  { text: "Do not waste water, even if you are on a flowing river.", src: "Prophet Muhammad ﷺ" },
  { text: "Whoever believes in Allah and the Last Day, let him speak good or remain silent.", src: "Prophet Muhammad ﷺ" },
  { text: "So remember Me; I will remember you.", src: "Quran 2:152" },
  { text: "He knows what is in every heart.", src: "Quran 67:13" },
  { text: "My mercy encompasses all things.", src: "Quran 7:156" },
  { text: "Call upon Me; I will respond to you.", src: "Quran 40:60" },
  { text: "And He found you lost and guided you.", src: "Quran 93:7" },
  { text: "Smile at your brother — it is charity.", src: "Prophet Muhammad ﷺ" },
  { text: "The strong man is not one who is good at wrestling, but the one who controls himself when angry.", src: "Prophet Muhammad ﷺ" },
  { text: "Every act of kindness is charity.", src: "Prophet Muhammad ﷺ" },
  { text: "Cleanliness is half of faith.", src: "Prophet Muhammad ﷺ" },
  { text: "Whoever is not thankful to people, is not thankful to Allah.", src: "Prophet Muhammad ﷺ" },
  { text: "Make du'a to Allah in a state of certainty that it will be answered.", src: "Prophet Muhammad ﷺ" },
  { text: "The most beloved deeds to Allah are those done consistently, even if they are small.", src: "Prophet Muhammad ﷺ" },
  { text: "Allah is beautiful and loves beauty.", src: "Prophet Muhammad ﷺ" },
  { text: "Verily Allah does not look at your appearance or wealth, but rather He looks at your hearts and actions.", src: "Prophet Muhammad ﷺ" },
  { text: "Lower your gaze and guard your modesty.", src: "Quran 24:30" },
  { text: "And We have created you in pairs.", src: "Quran 78:8" },
  { text: "Do not lose hope in the mercy of Allah.", src: "Quran 39:53" },
  { text: "Verily, the promise of Allah is truth.", src: "Quran 31:33" },
];

function getDailyQuote() {
  const d = new Date();
  const idx = (d.getFullYear() * 1000 + d.getMonth() * 32 + d.getDate()) % QUOTES.length;
  return QUOTES[idx];
}

// ── Static data ───────────────────────────────────────────────────
const NAMAZ_LIST = [
  { id:'tahajjud', name:'Tahajjud', optional:true,  apiKey:null },
  { id:'fajr',    name:'Fajr',     optional:false, apiKey:'Fajr' },
  { id:'zohar',   name:'Zohar',    optional:false, apiKey:'Dhuhr' },
  { id:'asr',     name:'Asr',      optional:false, apiKey:'Asr' },
  { id:'maghrib', name:'Maghrib',  optional:false, apiKey:'Maghrib' },
  { id:'isha',    name:'Isha',     optional:false, apiKey:'Isha' },
];

const DEFAULT_DHIKR = [
  { id:'rabbi_inni',    arabic:'Rabbi Inni Lima Anzalta Ilayya Min Khairin Faqir', meaning:'"My Lord, I am truly in great need of Your good"', target:100 },
  { id:'subhanallah',   arabic:'SubhanAllah',   meaning:'Glory be to Allah',          target:33 },
  { id:'alhamdulillah', arabic:'Alhamdulillah', meaning:'All praise is due to Allah', target:33 },
  { id:'allahuakbar',   arabic:'Allahu Akbar',  meaning:'Allah is the Greatest',      target:34 },
];

const DEFAULT_TASKS = [
  { id:'tahajjud_check', label:'Tahajjud prayer completed' },
  { id:'quran',          label:'Quran recitation' },
  { id:'fasting',        label:'Fasting / Sunnah fast' },
];

// ── State ────────────────────────────────────────────────────────
const SK = 'daily_tracker_v4';
const STREAK_KEY = 'dt_streak_v1';

function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
}

function defaultState(dhikrDefs, taskDefs) {
  const dd = dhikrDefs || DEFAULT_DHIKR;
  const td = taskDefs  || DEFAULT_TASKS;
  const namaz={}, dhikr={}, tasks={};
  NAMAZ_LIST.forEach(n => namaz[n.id]='pending');
  dd.forEach(d => dhikr[d.id]=0);
  td.forEach(t => tasks[t.id]=false);
  return { date:todayStr(), namaz, dhikr, tasks, dhikrDefs:dd, taskDefs:td };
}

function loadState() {
  try {
    const raw = localStorage.getItem(SK);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (obj.date !== todayStr()) {
      checkStreakOnNewDay(obj);
      return defaultState(obj.dhikrDefs, obj.taskDefs);
    }
    return obj;
  } catch { return null; }
}

let state = loadState() || defaultState();
if (!state.dhikrDefs) state.dhikrDefs = DEFAULT_DHIKR;
if (!state.taskDefs)  state.taskDefs  = DEFAULT_TASKS;

function saveState() { localStorage.setItem(SK, JSON.stringify(state)); }

// ── Streak ───────────────────────────────────────────────────────
function loadStreak() {
  try { return JSON.parse(localStorage.getItem(STREAK_KEY)) || { count:0, lastDay:'' }; }
  catch { return { count:0, lastDay:'' }; }
}
function saveStreak(s) { localStorage.setItem(STREAK_KEY, JSON.stringify(s)); }

function checkStreakOnNewDay(oldState) {
  const streak = loadStreak();
  const total = NAMAZ_LIST.filter(n=>!n.optional).length;
  const prayed = NAMAZ_LIST.filter(n=>!n.optional && oldState.namaz[n.id]==='prayed').length;
  const today = todayStr();
  if (prayed === total) {
    // All 5 prayed yesterday
    streak.count = (streak.lastDay === yesterdayStr()) ? streak.count + 1 : 1;
  } else {
    streak.count = 0;
  }
  streak.lastDay = today;
  saveStreak(streak);
}

function yesterdayStr() {
  const d = new Date(); d.setDate(d.getDate()-1);
  return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
}

function renderStreak() {
  const streak = loadStreak();
  document.getElementById('streakNum').textContent = streak.count;
}

// ── Hijri date ───────────────────────────────────────────────────
function toHijri(date) {
  // Algorithmic Hijri calculation (Umm al-Qura approximation)
  const JD = Math.floor((date.getTime() / 86400000) + 2440587.5);
  const l = JD - 1948440 + 10632;
  const n = Math.floor((l - 1) / 10631);
  const l2 = l - 10631 * n + 354;
  const j = Math.floor((10985 - l2) / 5316) * Math.floor((50 * l2) / 17719) +
             Math.floor(l2 / 5670) * Math.floor((43 * l2) / 15238);
  const l3 = l2 - Math.floor((30 - j) / 15) * Math.floor((17719 * j) / 50) -
              Math.floor(j / 16) * Math.floor((15238 * j) / 43) + 29;
  const month = Math.floor((24 * l3) / 709);
  const day = l3 - Math.floor((709 * month) / 24);
  const year = 30 * n + j - 30;
  const HIJRI_MONTHS = ['Muharram','Safar','Rabi al-Awwal','Rabi al-Thani','Jumada al-Ula','Jumada al-Akhirah','Rajab','Sha\'ban','Ramadan','Shawwal','Dhu al-Qi\'dah','Dhu al-Hijjah'];
  return `${day} ${HIJRI_MONTHS[month-1]} ${year} AH`;
}

// ── Prayer times ─────────────────────────────────────────────────
let prayerTimes = {};
let ptLoaded = false;

function initPrayerTimes() {
  if (!navigator.geolocation) { ptLoaded=true; renderNamaz(); updateCountdown(); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      fetchPT(pos.coords.latitude, pos.coords.longitude);
      fetchLocationName(pos.coords.latitude, pos.coords.longitude);
    },
    () => { ptLoaded=true; renderNamaz(); updateCountdown(); },
    { timeout:8000 }
  );
}

function fetchLocationName(lat, lon) {
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
    .then(r => r.json())
    .then(data => {
      const addr = data.address;
      const city = addr.city || addr.town || addr.village || addr.county || '';
      const country = addr.country_code ? addr.country_code.toUpperCase() : '';
      const loc = [city, country].filter(Boolean).join(', ');
      const el = document.getElementById('locationLine');
      if (el && loc) el.innerHTML = '📍 ' + loc;
    })
    .catch(() => {});
}

function fetchPT(lat, lon) {
  const d = new Date();
  const url = `https://api.aladhan.com/v1/timings/${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}?latitude=${lat}&longitude=${lon}&method=2`;
  fetch(url).then(r=>r.json()).then(data=>{
    if (data.code===200) prayerTimes = data.data.timings;
    ptLoaded = true; renderNamaz(); updateCountdown();
  }).catch(()=>{ ptLoaded=true; renderNamaz(); updateCountdown(); });
}

function toMin(s) {
  if (!s) return 0;
  const [h,m] = s.split(' ')[0].split(':').map(Number);
  return h*60+m;
}

function fmtTime(key) {
  const s = prayerTimes[key];
  if (!s) return '';
  const [h,m] = s.split(' ')[0].split(':').map(Number);
  return (h%12||12)+':'+(String(m).padStart(2,'0'))+(h>=12?' PM':' AM');
}

function getCurrentNamazId() {
  if (!ptLoaded || !Object.keys(prayerTimes).length) return null;
  const now = new Date(), nowMin = now.getHours()*60+now.getMinutes();
  const fajrMin = toMin(prayerTimes.Fajr);
  if (nowMin < fajrMin) return 'tahajjud';
  const wins = [
    {id:'fajr',    min:toMin(prayerTimes.Fajr)},
    {id:'zohar',   min:toMin(prayerTimes.Dhuhr)},
    {id:'asr',     min:toMin(prayerTimes.Asr)},
    {id:'maghrib', min:toMin(prayerTimes.Maghrib)},
    {id:'isha',    min:toMin(prayerTimes.Isha)},
  ];
  for (let i=wins.length-1; i>=0; i--) if (nowMin >= wins[i].min) return wins[i].id;
  return null;
}

// ── Countdown ────────────────────────────────────────────────────
const PRAYER_ORDER = [
  { name:'Fajr',    key:'Fajr' },
  { name:'Zohar',   key:'Dhuhr' },
  { name:'Asr',     key:'Asr' },
  { name:'Maghrib', key:'Maghrib' },
  { name:'Isha',    key:'Isha' },
];

function updateCountdown() {
  if (!ptLoaded || !Object.keys(prayerTimes).length) {
    document.getElementById('cdPrayer').textContent = 'Loading...';
    document.getElementById('cdTime').textContent = '--:--';
    return;
  }
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();
  let nextName = '', nextMin = Infinity;

  for (const p of PRAYER_ORDER) {
    const pm = toMin(prayerTimes[p.key]);
    if (pm > nowMin && pm < nextMin) { nextMin = pm; nextName = p.name; }
  }

  // If past Isha, next is Fajr tomorrow
  if (!nextName) {
    nextName = 'Fajr (tomorrow)';
    nextMin = toMin(prayerTimes.Fajr) + 24*60;
  }

  const diff = nextMin - nowMin;
  const h = Math.floor(diff/60), m = diff%60;
  document.getElementById('cdPrayer').textContent = nextName;
  document.getElementById('cdTime').textContent = h > 0 ? `${h}h ${m}m` : `${m}m`;
}

// ── Header ───────────────────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const ORD = n => n+(n%10===1&&n!==11?'st':n%10===2&&n!==12?'nd':n%10===3&&n!==13?'rd':'th');

function updateHeader() {
  const now = new Date(), day = now.getDay();
  const isWeekend = day===0 || day===6;
  document.getElementById('dateDisplay').innerHTML =
    `${ORD(now.getDate())} ${MONTHS[now.getMonth()]} - <span class="day-name">${DAYS[day]}</span>`;
  const dt = document.getElementById('dayType');
  dt.textContent = isWeekend ? 'Weekend' : 'Weekday';
  dt.className = 'day-type '+(isWeekend?'weekend':'weekday');
  document.getElementById('hijriDate').textContent = '🌙 ' + toHijri(now);
  const hh=String(now.getHours()).padStart(2,'0'), mm=String(now.getMinutes()).padStart(2,'0'), ss=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('liveClock').textContent = `🕐 ${hh}:${mm}:${ss}`;
}

// ── Midnight ─────────────────────────────────────────────────────
let lastDate = todayStr();
function checkMidnight() {
  const cur = todayStr();
  if (cur !== lastDate) {
    lastDate = cur;
    state = defaultState(state.dhikrDefs, state.taskDefs);
    saveState(); prayerTimes={}; ptLoaded=false;
    initPrayerTimes(); renderAll();
    setDailyQuote();
  }
}

// ── Quote ────────────────────────────────────────────────────────
function setDailyQuote() {
  const q = getDailyQuote();
  document.getElementById('quoteText').textContent = q.text;
  document.getElementById('quoteSrc').textContent = '— ' + q.src;
}

// ── Namaz ────────────────────────────────────────────────────────
function cycleStatus(s) { return s==='pending'?'prayed':s==='prayed'?'missed':'pending'; }

function renderNamaz() {
  const c = document.getElementById('namazList');
  c.innerHTML = '';
  const curId = getCurrentNamazId();
  let prayed=0, total=NAMAZ_LIST.filter(n=>!n.optional).length;

  NAMAZ_LIST.forEach(namaz => {
    const status = state.namaz[namaz.id];
    if (status==='prayed' && !namaz.optional) prayed++;
    const isCur = namaz.id===curId;

    const row = document.createElement('div');
    row.className = 'namaz-row'+(isCur?' cur-namaz':'');

    if (isCur) { const dot=document.createElement('div'); dot.className='pulse'; row.appendChild(dot); }

    const nm = document.createElement('span');
    nm.className = 'namaz-nm'+(namaz.optional?' opt-lbl':'');
    nm.textContent = namaz.name+(namaz.optional?' ✦':'');
    row.appendChild(nm);

    if (namaz.apiKey && ptLoaded) {
      const ts = document.createElement('span');
      ts.className = 'namaz-t'+(isCur?' cur':'');
      ts.textContent = fmtTime(namaz.apiKey);
      row.appendChild(ts);
    }

    const badge = document.createElement('span');
    badge.className = 'n-badge st-'+status;
    badge.textContent = status.charAt(0).toUpperCase()+status.slice(1);
    row.appendChild(badge);

    row.addEventListener('click', () => {
      state.namaz[namaz.id] = cycleStatus(state.namaz[namaz.id]);
      saveState(); renderNamaz();
    });
    c.appendChild(row);
  });

  document.getElementById('namazProgress').style.width = Math.round((prayed/total)*100)+'%';
  document.getElementById('namazCount').textContent = prayed+'/'+total+' prayed';
}

// ── Dhikr ────────────────────────────────────────────────────────
function renderDhikr() {
  const c = document.getElementById('dhikrList');
  c.innerHTML = '';
  state.dhikrDefs.forEach(d => {
    const count = state.dhikr[d.id]||0, done = count>=d.target;
    const row = document.createElement('div');
    row.className = 'counter-row'+(done?' c-done':'');

    const lbl = document.createElement('div'); lbl.className = 'c-label'+(done?' c-done':'');
    const ar = document.createElement('div'); ar.className = 'c-arabic'; ar.textContent = d.arabic;
    const me = document.createElement('div'); me.className = 'c-meaning'; me.textContent = d.meaning;
    lbl.appendChild(ar); lbl.appendChild(me);

    const ctrl = document.createElement('div'); ctrl.className = 'c-controls';

    const minus = document.createElement('button'); minus.className = 'c-btn'; minus.textContent = '−';
    minus.onclick = e => { e.stopPropagation(); if((state.dhikr[d.id]||0)>0){state.dhikr[d.id]--;saveState();renderDhikr();} };

    const valWrap = document.createElement('div'); valWrap.className = 'c-val-wrap';
    const val = document.createElement('div'); val.className = 'c-val'+(done?' done':''); val.textContent = count;
    const tgt = document.createElement('div'); tgt.className = 'c-tgt'; tgt.textContent = '/ '+d.target;
    valWrap.appendChild(val); valWrap.appendChild(tgt);

    const plus = document.createElement('button'); plus.className = 'c-btn'; plus.textContent = '+';
    plus.onclick = e => { e.stopPropagation(); state.dhikr[d.id]=(state.dhikr[d.id]||0)+1; saveState(); renderDhikr(); };

    ctrl.appendChild(minus); ctrl.appendChild(valWrap); ctrl.appendChild(plus);
    row.appendChild(lbl); row.appendChild(ctrl);
    c.appendChild(row);
  });
}

// ── Tasks ────────────────────────────────────────────────────────
function renderTasks() {
  const c = document.getElementById('taskList');
  c.innerHTML = '';
  state.taskDefs.forEach(t => {
    const done = !!state.tasks[t.id];
    const row = document.createElement('div');
    row.className = 'task-row'+(done?' done':'');
    const radio = document.createElement('div'); radio.className = 'radio';
    const lbl = document.createElement('div'); lbl.className = 'task-lbl'; lbl.textContent = t.label;
    row.appendChild(radio); row.appendChild(lbl);
    row.addEventListener('click', () => { state.tasks[t.id]=!state.tasks[t.id]; saveState(); renderTasks(); });
    c.appendChild(row);
  });
}

function renderAll() {
  updateHeader(); renderStreak(); renderNamaz(); renderDhikr(); renderTasks();
}

// ── Dhikr modal ───────────────────────────────────────────────────
let editDhikr=[];
function openDhikrModal(){ editDhikr=state.dhikrDefs.map(d=>({...d})); buildDhikrEdit(); document.getElementById('dhikrModal').classList.add('open'); }
function closeDhikrModal(){ document.getElementById('dhikrModal').classList.remove('open'); }
function buildDhikrEdit(){
  const c=document.getElementById('dhikrEditList'); c.innerHTML='';
  editDhikr.forEach((d,i)=>{
    const item=document.createElement('div'); item.className='m-item';
    item.innerHTML=`<label>Dhikr Text</label><input type="text" value="${esc(d.arabic)}" oninput="editDhikr[${i}].arabic=this.value"><label>Meaning (optional)</label><input type="text" value="${esc(d.meaning)}" oninput="editDhikr[${i}].meaning=this.value"><label>Target Count</label><input type="number" value="${d.target}" min="1" oninput="editDhikr[${i}].target=parseInt(this.value)||1"><div class="m-actions"><button class="del-btn" onclick="delDhikr(${i})">🗑 Remove</button></div>`;
    c.appendChild(item);
  });
}
function addDhikrItem(){ editDhikr.push({id:'dh_'+Date.now(),arabic:'',meaning:'',target:33}); buildDhikrEdit(); }
function delDhikr(i){ editDhikr.splice(i,1); buildDhikrEdit(); }
function saveDhikr(){
  const v=editDhikr.filter(d=>d.arabic.trim());
  state.dhikrDefs=v; v.forEach(d=>{ if(state.dhikr[d.id]===undefined) state.dhikr[d.id]=0; });
  saveState(); renderDhikr(); closeDhikrModal();
}

// ── Task modal ────────────────────────────────────────────────────
let editTasks=[];
function openTaskModal(){ editTasks=state.taskDefs.map(t=>({...t})); buildTaskEdit(); document.getElementById('taskModal').classList.add('open'); }
function closeTaskModal(){ document.getElementById('taskModal').classList.remove('open'); }
function buildTaskEdit(){
  const c=document.getElementById('taskEditList'); c.innerHTML='';
  editTasks.forEach((t,i)=>{
    const item=document.createElement('div'); item.className='m-item';
    item.innerHTML=`<label>Task Name</label><input type="text" value="${esc(t.label)}" oninput="editTasks[${i}].label=this.value"><div class="m-actions"><button class="del-btn" onclick="delTask(${i})">🗑 Remove</button></div>`;
    c.appendChild(item);
  });
}
function addTaskItem(){ editTasks.push({id:'task_'+Date.now(),label:''}); buildTaskEdit(); }
function delTask(i){ editTasks.splice(i,1); buildTaskEdit(); }
function saveTasksModal(){
  const v=editTasks.filter(t=>t.label.trim());
  state.taskDefs=v; v.forEach(t=>{ if(state.tasks[t.id]===undefined) state.tasks[t.id]=false; });
  saveState(); renderTasks(); closeTaskModal();
}

// ── Reset ─────────────────────────────────────────────────────────
function showConfirm(){ document.getElementById('confirmBox').classList.add('vis'); }
function hideConfirm(){ document.getElementById('confirmBox').classList.remove('vis'); }
function doReset(){
  const n={},dh={},tk={};
  NAMAZ_LIST.forEach(x=>n[x.id]='pending');
  state.dhikrDefs.forEach(x=>dh[x.id]=0);
  state.taskDefs.forEach(x=>tk[x.id]=false);
  state.namaz=n; state.dhikr=dh; state.tasks=tk;
  saveState(); renderAll(); hideConfirm();
}

// ── Utils ─────────────────────────────────────────────────────────
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('dhikrModal').addEventListener('click',function(e){ if(e.target===this) closeDhikrModal(); });
document.getElementById('taskModal').addEventListener('click',function(e){ if(e.target===this) closeTaskModal(); });

// ── Boot ──────────────────────────────────────────────────────────
setDailyQuote();
renderAll();
initPrayerTimes();

setInterval(()=>{ updateHeader(); checkMidnight(); updateCountdown(); }, 1000);
setInterval(()=>{ if(ptLoaded) renderNamaz(); }, 60000);
</script>
</body>
</html>
