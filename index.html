<meta name="apple-mobile-web-app-capable" content="yes">

<title>Daily Tracker</title>
<style>
:root {
  --bg:#0d0d0d; --card:#1a1a1a; --card2:#222; --border:#2e2e2e;
  --text:#e8e8e8; --muted:#777; --gold:#c8a84b; --accent:#4ec9b0;
  --teal:#56c9a0; --red:#e05c5c; --green:#4ec9b0; --weekend:#e07070;
  --hi-bg:rgba(78,201,176,0.08); --hi-brd:#4ec9b0;
}
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{ scrollbar-width:none; -ms-overflow-style:none; height:100%; overflow:hidden; }
html::-webkit-scrollbar,body::-webkit-scrollbar{ display:none; }
body{ background:var(--bg); color:var(--text); font-family:-apple-system,sans-serif; }
.frame{ max-width:430px; margin:0 auto; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.page{ display:none; flex:1; overflow-y:auto; overflow-x:hidden; scrollbar-width:none; }
.page::-webkit-scrollbar{ display:none; }
.page.active{ display:flex; flex-direction:column; }

/* NAV */
.nav-tabs{ background:var(--card); border-top:1px solid var(--border); display:flex; flex-shrink:0; padding-bottom:env(safe-area-inset-bottom); }
.nav-tab{ flex:1; padding:8px 0 10px; text-align:center; font-size:9px; color:var(--muted); cursor:pointer; border:none; background:none; transition:color 0.2s; }
.nav-tab .ti{ font-size:19px; display:block; margin-bottom:2px; }
.nav-tab.active{ color:var(--accent); }

/* HOME */
#page-home{ padding:0; gap:0; justify-content:space-between; padding-bottom:10px; }
.home-top{ padding:16px 18px 10px; flex-shrink:0; }
.home-date-row{ display:flex; align-items:flex-start; justify-content:space-between; }
.home-date-main{ font-family:Georgia,serif; font-size:20px; font-weight:700; line-height:1.2; }
.day-name{ text-decoration:underline; font-style:italic; }
.home-daytype{ font-size:13px; font-weight:600; margin-top:2px; }
.home-daytype.weekday{ color:var(--accent); }
.home-daytype.weekend{ color:var(--weekend); }
.home-sub{ font-size:11px; color:var(--muted); margin-top:3px; line-height:1.6; }
.home-clock-big{ font-family:Georgia,serif; font-size:38px; font-weight:700; color:var(--accent); letter-spacing:2px; text-align:right; line-height:1; }
.home-clock-sec{ font-size:14px; color:var(--muted); text-align:right; margin-top:2px; }
.home-cards{ display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 12px; flex-shrink:0; }
.hcard{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px 14px; }
.hcard-label{ font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.hcard-val{ font-family:Georgia,serif; font-size:20px; font-weight:700; color:var(--gold); }
.hcard-sub{ font-size:11px; color:var(--accent); margin-top:3px; font-weight:600; }

/* Namaz pills on home */
.home-namaz{ padding:0 12px; flex-shrink:0; }
.home-namaz-inner{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px 14px; }
.hnam-label{ font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
.hnam-pills{ display:flex; gap:6px; flex-wrap:wrap; }
.hnam-pill{ font-size:12px; padding:4px 12px; border-radius:20px; font-weight:500; cursor:pointer; }
.hnam-pill.st-pending{ background:rgba(107,138,112,0.15); color:var(--muted); }
.hnam-pill.st-prayed{ background:rgba(78,201,176,0.18); color:var(--green); }
.hnam-pill.st-missed{ background:rgba(224,92,92,0.15); color:var(--red); }
.hnam-pill.cur{ border:1px solid var(--accent); }
.prog-bar{ height:3px; background:var(--border); border-radius:2px; margin-top:8px; }
.prog-fill{ height:100%; background:linear-gradient(90deg,var(--teal),var(--accent)); transition:width 0.4s; border-radius:2px; }

/* Tasks on home */
.home-tasks{ padding:0 12px; flex-shrink:0; }
.home-tasks-inner{ background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.home-tasks-hdr{ padding:10px 14px 8px; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.home-task-row{ display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid var(--border); cursor:pointer; }
.home-task-row:last-child{ border-bottom:none; }
.radio{ width:20px; height:20px; border-radius:50%; border:2px solid var(--muted); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.home-task-row.done .radio{ border-color:var(--green); background:var(--green); }
.home-task-row.done .radio::after{ content:""; width:6px; height:4px; border-left:2px solid #000; border-bottom:2px solid #000; transform:rotate(-45deg) translateY(-1px); }
.home-task-lbl{ font-size:13px; flex:1; }
.home-task-row.done .home-task-lbl{ color:var(--muted); text-decoration:line-through; }

/* Quote */
.home-quote{ padding:0 12px; flex-shrink:0; }
.home-quote-inner{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:10px 14px; display:flex; gap:10px; align-items:flex-start; }
.qmark{ font-family:Georgia,serif; font-size:32px; color:var(--accent); opacity:0.4; line-height:1; flex-shrink:0; margin-top:-4px; }
.qtext{ font-family:Georgia,serif; font-size:12px; font-style:italic; line-height:1.5; color:var(--text); }
.qsrc{ font-size:10px; color:var(--muted); margin-top:3px; }

/* DHIKR PAGE */
.page-inner{ padding:12px 12px 20px; }
.section{ margin-bottom:10px; background:var(--card); border-radius:14px; overflow:hidden; border:1px solid var(--border); }
.sec-hdr{ padding:10px 16px; font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.edit-btn{ font-size:11px; color:var(--teal); background:none; border:none; cursor:pointer; padding:0; letter-spacing:0; text-transform:none; }
.counter-row{ display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
.counter-row:last-child{ border-bottom:none; }
.c-label{ flex:1; min-width:140px; }
.c-arabic{ font-family:Georgia,serif; font-size:13px; margin-bottom:2px; white-space:normal; word-break:break-word; line-height:1.4; }
.c-meaning{ font-size:10px; color:var(--muted); font-style:italic; white-space:normal; word-break:break-word; line-height:1.4; }
.c-done .c-arabic{ color:var(--muted); text-decoration:line-through; }
.c-controls{ display:flex; align-items:center; background:var(--card2); border:1px solid var(--border); border-radius:10px; overflow:hidden; flex-shrink:0; }
.c-btn{ background:none; border:none; color:var(--text); font-size:26px; cursor:pointer; width:44px; height:44px; display:flex; align-items:center; justify-content:center; -webkit-user-select:none; user-select:none; transition:background 0.12s; }
.c-btn:active{ background:rgba(255,255,255,0.06); }
.c-val-wrap{ display:flex; flex-direction:column; align-items:center; justify-content:center; min-width:46px; padding:0 2px; border-left:1px solid var(--border); border-right:1px solid var(--border); }
.c-val{ font-family:Georgia,serif; font-size:17px; font-weight:700; color:var(--gold); line-height:1; }
.c-val.done{ color:var(--green); }
.c-tgt{ font-size:9px; color:var(--muted); margin-top:1px; }
.reset-wrap{ text-align:center; padding:4px 0 8px; }
.reset-btn{ background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--muted); font-size:12px; padding:6px 20px; border-radius:20px; cursor:pointer; }
.confirm-box{ display:none; margin:10px 16px 0; background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:12px 16px; font-size:13px; text-align:center; }
.confirm-box.vis{ display:block; }
.confirm-actions{ display:flex; gap:10px; margin-top:10px; justify-content:center; }
.cy{ background:rgba(224,92,92,0.15); border:1px solid var(--red); color:var(--red); padding:5px 20px; border-radius:20px; font-size:12px; cursor:pointer; }
.cn{ background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--muted); padding:5px 20px; border-radius:20px; font-size:12px; cursor:pointer; }

/* NAMAZ section inside dhikr page */
.namaz-row{ display:flex; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; gap:10px; transition:background 0.15s; }
.namaz-row:last-child{ border-bottom:none; }
.namaz-row.cur-namaz{ background:var(--hi-bg); border-left:3px solid var(--hi-brd); }
.namaz-row.cur-namaz .namaz-nm{ color:var(--accent); font-weight:600; }
.namaz-nm{ flex:1; font-size:14px; }
.opt-lbl{ color:var(--teal); }
.namaz-t{ font-size:11px; color:var(--muted); }
.namaz-t.cur{ color:var(--gold); font-weight:600; }
.n-badge{ font-size:11px; padding:3px 10px; border-radius:20px; font-weight:500; flex-shrink:0; }
.st-pending{ background:rgba(107,138,112,0.15); color:var(--muted); }
.st-prayed{ background:rgba(78,201,176,0.15); color:var(--green); }
.st-missed{ background:rgba(224,92,92,0.15); color:var(--red); }
.pulse{ width:7px; height:7px; border-radius:50%; background:var(--accent); flex-shrink:0; animation:pulse 1.4s infinite; }
@keyframes pulse{ 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.65)} }
.namaz-count{ font-size:11px; color:var(--accent); font-weight:600; letter-spacing:0; text-transform:none; }
.missed-count{ font-size:11px; color:var(--red); font-weight:600; letter-spacing:0; text-transform:none; }
.sec-hdr-right{ display:flex; gap:8px; align-items:center; }
.city-row{ display:flex; gap:8px; margin-bottom:10px; }
.city-input{ flex:1; background:var(--card); border:1px solid var(--border); color:var(--text); font-size:12px; padding:8px 12px; border-radius:10px; outline:none; }
.city-input:focus{ border-color:var(--accent); }
.city-btn{ background:var(--accent); border:none; color:#000; font-size:12px; font-weight:700; padding:8px 14px; border-radius:10px; cursor:pointer; }

/* TASBIH */
.tasbih-page{ display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; padding:16px; gap:14px; }
.tsb-selector{ width:100%; }
.tsb-select-label{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; text-align:center; }
.tsb-pills{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.tsb-pill{ background:var(--card); border:1px solid var(--border); color:var(--muted); font-size:12px; padding:5px 14px; border-radius:20px; cursor:pointer; }
.tsb-pill.active{ border-color:var(--accent); color:var(--accent); background:var(--hi-bg); }

/* Custom tasbih input */
.tsb-custom-area{ width:100%; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px 14px; }
.tsb-custom-label{ font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.tsb-custom-row{ display:flex; gap:8px; align-items:center; }
.tsb-custom-input{ flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:13px; padding:7px 10px; border-radius:8px; outline:none; }
.tsb-custom-input:focus{ border-color:var(--accent); }
.tsb-custom-btn{ background:var(--accent); border:none; color:#000; font-size:12px; font-weight:700; padding:7px 14px; border-radius:8px; cursor:pointer; white-space:nowrap; }

.tsb-name{ font-family:Georgia,serif; font-size:16px; color:var(--text); text-align:center; }
.tsb-meaning{ font-size:12px; color:var(--muted); text-align:center; font-style:italic; }
.tsb-tap{ width:190px; height:190px; border-radius:50%; background:var(--hi-bg); border:3px solid var(--hi-brd); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform 0.08s,background 0.08s; -webkit-user-select:none; user-select:none; flex-direction:column; gap:4px; }
.tsb-tap:active{ transform:scale(0.93); background:rgba(78,201,176,0.18); }
.tsb-num{ font-family:Georgia,serif; font-size:68px; font-weight:700; color:var(--accent); line-height:1; }
.tsb-tap-lbl{ font-size:12px; color:var(--muted); }
.tsb-tgt-lbl{ font-size:13px; color:var(--muted); }
.tsb-btns{ display:flex; gap:12px; }
.tsb-btn{ background:var(--card); border:1px solid var(--border); color:var(--text); font-size:12px; padding:8px 20px; border-radius:20px; cursor:pointer; }
.tsb-btn.danger{ border-color:rgba(224,92,92,0.4); color:var(--red); }

/* CALENDAR */
.cal-page{ padding:16px 12px 20px; }
.cal-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.cal-title{ font-family:Georgia,serif; font-size:16px; font-weight:700; }
.cal-nav{ background:none; border:1px solid var(--border); color:var(--text); width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
.cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cal-day-label{ text-align:center; font-size:10px; color:var(--muted); padding-bottom:4px; }
.cal-cell{ aspect-ratio:1; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:12px; background:var(--card2); border:1px solid var(--border); }
.cal-cell.today{ border-color:var(--accent); color:var(--accent); font-weight:700; }
.cal-cell.empty{ background:transparent; border-color:transparent; }
.cal-dots{ display:flex; gap:2px; margin-top:2px; }
.cal-dot{ width:4px; height:4px; border-radius:50%; }
.dot-green{ background:var(--green); }
.dot-red{ background:var(--red); }
.dot-grey{ background:var(--muted); }
.cal-legend{ display:flex; gap:14px; justify-content:center; margin-top:10px; font-size:11px; color:var(--muted); flex-wrap:wrap; }
.cal-legend span{ display:flex; align-items:center; gap:4px; }

/* JOURNAL */
.journal-page{ padding:12px 12px 20px; }
.journal-input-area{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; }
.journal-date-label{ font-size:11px; color:var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
.journal-textarea{ width:100%; background:transparent; border:none; color:var(--text); font-size:14px; line-height:1.6; resize:none; outline:none; min-height:90px; }
.journal-save{ display:block; width:100%; background:var(--accent); border:none; color:#000; font-size:13px; font-weight:700; padding:10px; border-radius:10px; cursor:pointer; margin-bottom:12px; }
.journal-entries{ display:flex; flex-direction:column; gap:10px; }
.journal-entry{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
.je-date{ font-size:10px; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
.je-text{ font-size:13px; line-height:1.6; color:var(--text); white-space:pre-wrap; }
.je-del{ background:none; border:none; color:var(--red); font-size:11px; cursor:pointer; margin-top:8px; opacity:0.7; }
.journal-empty{ text-align:center; color:var(--muted); font-size:13px; padding:30px; font-style:italic; }

/* MODAL */
.modal-ov{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; align-items:flex-end; justify-content:center; }
.modal-ov.open{ display:flex; }
.modal{ background:var(--card); border-radius:20px 20px 0 0; width:100%; max-width:430px; padding:20px 20px 48px; max-height:88vh; overflow-y:auto; scrollbar-width:none; }
.modal::-webkit-scrollbar{ display:none; }
.modal-title{ font-family:Georgia,serif; font-size:16px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
.modal-close{ background:rgba(255,255,255,0.07); border:none; color:var(--text); width:28px; height:28px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.m-item{ background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:10px; }
.m-item label{ display:block; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; margin-top:8px; }
.m-item label:first-child{ margin-top:0; }
.m-item input{ width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:13px; padding:8px 10px; border-radius:7px; outline:none; }
.m-item input[type=number]{ width:80px; }
.m-item input:focus{ border-color:var(--accent); }
.m-actions{ margin-top:10px; }
.del-btn{ background:rgba(224,92,92,0.1); border:1px solid rgba(224,92,92,0.3); color:var(--red); font-size:11px; padding:4px 14px; border-radius:14px; cursor:pointer; }
.add-btn{ display:block; width:100%; background:rgba(86,201,160,0.07); border:1px dashed var(--teal); color:var(--teal); font-size:13px; padding:10px; border-radius:10px; cursor:pointer; margin-top:4px; text-align:center; }
.save-btn{ display:block; width:100%; background:var(--accent); border:none; color:#000; font-size:14px; font-weight:700; padding:12px; border-radius:10px; cursor:pointer; margin-top:14px; }
</style>
</head>
<body>
<div class="frame">

        <div class="confirm-actions">

<!-- NAV -->

  <button class="nav-tab" onclick="showPage('dhikr',this)"><span class="ti">📿</span>Dhikr</button>
  <button class="nav-tab" onclick="showPage('tasbih',this)"><span class="ti">🔢</span>Tasbih</button>

    <button class="add-btn" onclick="addTaskItem()">+ Add Task</button>
    <button class="save-btn" onclick="saveTasksModal()">Save Changes</button>
  </div>
</div>

<script>
const QUOTES=[
  {text:"Verily, with hardship comes ease.",src:"Quran 94:5"},
  {text:"Allah does not burden a soul beyond that it can bear.",src:"Quran 2:286"},
  {text:"And whoever puts their trust in Allah, He will be enough for them.",src:"Quran 65:3"},
  {text:"Indeed, Allah is with the patient.",src:"Quran 2:153"},
  {text:"Speak good or remain silent.",src:"Prophet Muhammad ﷺ"},
  {text:"The best of people are those most beneficial to people.",src:"Prophet Muhammad ﷺ"},
  {text:"Make things easy, do not make them difficult.",src:"Prophet Muhammad ﷺ"},
  {text:"None of you truly believes until he loves for his brother what he loves for himself.",src:"Prophet Muhammad ﷺ"},
  {text:"Richness is being content with oneself.",src:"Prophet Muhammad ﷺ"},
  {text:"So remember Me; I will remember you.",src:"Quran 2:152"},
  {text:"My mercy encompasses all things.",src:"Quran 7:156"},
  {text:"Call upon Me; I will respond to you.",src:"Quran 40:60"},
  {text:"And He found you lost and guided you.",src:"Quran 93:7"},
  {text:"Every act of kindness is charity.",src:"Prophet Muhammad ﷺ"},
  {text:"Cleanliness is half of faith.",src:"Prophet Muhammad ﷺ"},
  {text:"The most beloved deeds to Allah are those done consistently, even if small.",src:"Prophet Muhammad ﷺ"},
  {text:"Allah is beautiful and loves beauty.",src:"Prophet Muhammad ﷺ"},
  {text:"Do not lose hope in the mercy of Allah.",src:"Quran 39:53"},
  {text:"Indeed, prayer prohibits immorality and wrongdoing.",src:"Quran 29:45"},
  {text:"He knows what is in every heart.",src:"Quran 67:13"},
  {text:"Smile at your brother — it is charity.",src:"Prophet Muhammad ﷺ"},
  {text:"The strong man controls himself when angry.",src:"Prophet Muhammad ﷺ"},
  {text:"Whoever is not thankful to people is not thankful to Allah.",src:"Prophet Muhammad ﷺ"},
  {text:"Verily, the promise of Allah is truth.",src:"Quran 31:33"},
  {text:"Take benefit of five before five: youth, health, wealth, free time, and life.",src:"Prophet Muhammad ﷺ"},
];

const NAMAZ_LIST=[
  {id:'tahajjud',name:'Tahajjud',optional:true,apiKey:null},
  {id:'fajr',name:'Fajr',optional:false,apiKey:'Fajr'},
  {id:'zohar',name:'Zohar',optional:false,apiKey:'Dhuhr'},
  {id:'asr',name:'Asr',optional:false,apiKey:'Asr'},
  {id:'maghrib',name:'Maghrib',optional:false,apiKey:'Maghrib'},
  {id:'isha',name:'Isha',optional:false,apiKey:'Isha'},
];
const DEFAULT_DHIKR=[
  {id:'rabbi_inni',arabic:'Rabbi Inni Lima Anzalta Ilayya Min Khairin Faqir',meaning:'"My Lord, I am truly in great need of Your good"',target:100},
  {id:'subhanallah',arabic:'SubhanAllah',meaning:'Glory be to Allah',target:33},
  {id:'alhamdulillah',arabic:'Alhamdulillah',meaning:'All praise is due to Allah',target:33},
  {id:'allahuakbar',arabic:'Allahu Akbar',meaning:'Allah is the Greatest',target:34},
];
const DEFAULT_TASKS=[
  {id:'tahajjud_check',label:'Tahajjud prayer completed'},
  {id:'quran',label:'Quran recitation'},
  {id:'fasting',label:'Fasting / Sunnah fast'},
];

const SK='dt_v8',STREAK_KEY='dt_streak_v2',HIST_KEY='dt_hist_v1',JOURNAL_KEY='dt_journal_v1',TSB_KEY='dt_tasbih_v1';

function todayStr(){const d=new Date();return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();}
function yesterdayStr(){const d=new Date();d.setDate(d.getDate()-1);return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();}

function defaultState(dd,td){
  dd=dd||DEFAULT_DHIKR;td=td||DEFAULT_TASKS;
  const namaz={},dhikr={},tasks={};
  NAMAZ_LIST.forEach(n=>namaz[n.id]='pending');
  dd.forEach(d=>dhikr[d.id]=0);td.forEach(t=>tasks[t.id]=false);
  return {date:todayStr(),namaz,dhikr,tasks,dhikrDefs:dd,taskDefs:td};
}
function loadState(){
  try{
    const raw=localStorage.getItem(SK);if(!raw)return null;
    const obj=JSON.parse(raw);
    if(obj.date!==todayStr()){checkStreakOnNewDay(obj);saveHistory(obj);return defaultState(obj.dhikrDefs,obj.taskDefs);}
    return obj;
  }catch{return null;}
}
let state=loadState()||defaultState();
if(!state.dhikrDefs)state.dhikrDefs=DEFAULT_DHIKR;
if(!state.taskDefs)state.taskDefs=DEFAULT_TASKS;
function saveState(){localStorage.setItem(SK,JSON.stringify(state));}

// STREAK
function loadStreak(){try{return JSON.parse(localStorage.getItem(STREAK_KEY))||{count:0,lastDay:''};}catch{return{count:0,lastDay:''};}}
function saveStreak(s){localStorage.setItem(STREAK_KEY,JSON.stringify(s));}
function checkStreakOnNewDay(old){
  const s=loadStreak(),total=NAMAZ_LIST.filter(n=>!n.optional).length;
  const prayed=NAMAZ_LIST.filter(n=>!n.optional&&old.namaz[n.id]==='prayed').length;
  s.count=(prayed===total)?(s.lastDay===yesterdayStr()?s.count+1:1):0;
  s.lastDay=todayStr();saveStreak(s);
}
function renderStreak(){document.getElementById('streakNum').textContent=loadStreak().count;}

// HISTORY
function loadHistory(){try{return JSON.parse(localStorage.getItem(HIST_KEY))||{};}catch{return{};}}
function saveHistory(old){
  const h=loadHistory(),total=NAMAZ_LIST.filter(n=>!n.optional).length;
  const prayed=NAMAZ_LIST.filter(n=>!n.optional&&old.namaz[n.id]==='prayed').length;
  const missed=NAMAZ_LIST.filter(n=>!n.optional&&old.namaz[n.id]==='missed').length;
  h[old.date]={prayed,missed,total};localStorage.setItem(HIST_KEY,JSON.stringify(h));
}

// HIJRI
function toHijri(date){
  const JD=Math.floor((date.getTime()/86400000)+2440587.5);
  const l=JD-1948440+10632,n=Math.floor((l-1)/10631),l2=l-10631*n+354;
  const j=Math.floor((10985-l2)/5316)*Math.floor((50*l2)/17719)+Math.floor(l2/5670)*Math.floor((43*l2)/15238);
  const l3=l2-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29;
  const month=Math.floor((24*l3)/709),day=l3-Math.floor((709*month)/24),year=30*n+j-30;
  const HM=['Muharram','Safar','Rabi al-Awwal','Rabi al-Thani','Jumada al-Ula','Jumada al-Akhirah','Rajab',"Sha'ban",'Ramadan','Shawwal',"Dhu al-Qi'dah",'Dhu al-Hijjah'];
  return day+' '+HM[month-1]+' '+year+' AH';
}

// PRAYER TIMES
let prayerTimes={},ptLoaded=false,cityOverride='';
function initPrayerTimes(){
  const saved=localStorage.getItem('dt_city');
  if(saved){cityOverride=saved;}
  if(!navigator.geolocation){ptLoaded=true;renderNamaz();updateCountdown();return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{fetchPT(pos.coords.latitude,pos.coords.longitude);if(!cityOverride)fetchCity(pos.coords.latitude,pos.coords.longitude);},
    ()=>{ptLoaded=true;renderNamaz();updateCountdown();},{timeout:8000}
  );
}
function fetchCity(lat,lon){
  fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json')
    .then(r=>r.json()).then(d=>{
      const a=d.address,city=a.city||a.town||a.village||a.county||'',cc=a.country_code?a.country_code.toUpperCase():'';
      if(!cityOverride&&city){cityOverride=[city,cc].filter(Boolean).join(', ');updateHomeSubLine();}
    }).catch(()=>{});
}
function fetchPT(lat,lon){
  const d=new Date();
  fetch('https://api.aladhan.com/v1/timings/'+String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear()+'?latitude='+lat+'&longitude='+lon+'&method=2')
    .then(r=>r.json()).then(data=>{if(data.code===200)prayerTimes=data.data.timings;ptLoaded=true;renderNamaz();updateCountdown();})
    .catch(()=>{ptLoaded=true;renderNamaz();updateCountdown();});
}
function toMin(s){if(!s)return 0;const[h,m]=s.split(' ')[0].split(':').map(Number);return h*60+m;}
function fmtTime(key){const s=prayerTimes[key];if(!s)return'';const[h,m]=s.split(' ')[0].split(':').map(Number);return(h%12||12)+':'+(String(m).padStart(2,'0'))+(h>=12?' PM':' AM');}
function getCurrentNamazId(){
  if(!ptLoaded||!Object.keys(prayerTimes).length)return null;
  const now=new Date(),nowMin=now.getHours()*60+now.getMinutes();
  if(nowMin<toMin(prayerTimes.Fajr))return 'tahajjud';
  const wins=[{id:'fajr',min:toMin(prayerTimes.Fajr)},{id:'zohar',min:toMin(prayerTimes.Dhuhr)},{id:'asr',min:toMin(prayerTimes.Asr)},{id:'maghrib',min:toMin(prayerTimes.Maghrib)},{id:'isha',min:toMin(prayerTimes.Isha)}];
  for(let i=wins.length-1;i>=0;i--)if(nowMin>=wins[i].min)return wins[i].id;
  return null;
}
function updateCountdown(){
  if(!ptLoaded||!Object.keys(prayerTimes).length){document.getElementById('cdPrayer').textContent='Locating...';document.getElementById('cdTime').textContent='--:--';return;}
  const now=new Date(),nowMin=now.getHours()*60+now.getMinutes();
  const order=[{name:'Fajr',key:'Fajr'},{name:'Zohar',key:'Dhuhr'},{name:'Asr',key:'Asr'},{name:'Maghrib',key:'Maghrib'},{name:'Isha',key:'Isha'}];
  let nextName='',nextMin=Infinity;
  for(const p of order){const pm=toMin(prayerTimes[p.key]);if(pm>nowMin&&pm<nextMin){nextMin=pm;nextName=p.name;}}
  if(!nextName){nextName='Fajr (tomorrow)';nextMin=toMin(prayerTimes.Fajr)+24*60;}
  const diff=nextMin-nowMin,h=Math.floor(diff/60),m=diff%60;
  document.getElementById('cdPrayer').textContent=nextName;
  document.getElementById('cdTime').textContent=h>0?h+'h '+m+'m':m+'m';
}

// HEADER
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const ORD=n=>n+(n%10===1&&n!==11?'st':n%10===2&&n!==12?'nd':n%10===3&&n!==13?'rd':'th');
function updateHomeSubLine(){
  const parts=['🌙 '+toHijri(new Date())];
  if(cityOverride)parts.push('📍 '+cityOverride);
  document.getElementById('homeSubLine').textContent=parts.join('  ');
}
function updateHeader(){
  const now=new Date(),day=now.getDay(),isWeekend=day===0||day===6;
  document.getElementById('dateDisplay').innerHTML=ORD(now.getDate())+' '+MONTHS[now.getMonth()]+' — <span class="day-name">'+DAYS[day]+'</span>';
  const dt=document.getElementById('dayType');
  dt.textContent=isWeekend?'Weekend':'Weekday';
  dt.className='home-daytype '+(isWeekend?'weekend':'weekday');
  const hh=String(now.getHours()).padStart(2,'0'),mm=String(now.getMinutes()).padStart(2,'0'),ss=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('homeClock').textContent=hh+':'+mm;
  document.getElementById('homeClockSec').textContent=':'+ss;
  document.getElementById('journalDateLabel').textContent=ORD(now.getDate())+' '+MONTHS[now.getMonth()]+' '+now.getFullYear();
  updateHomeSubLine();
}

// MIDNIGHT
let lastDate=todayStr();
function checkMidnight(){
  const cur=todayStr();
  if(cur!==lastDate){
    saveHistory(state);lastDate=cur;
    state=defaultState(state.dhikrDefs,state.taskDefs);
    saveState();prayerTimes={};ptLoaded=false;
    initPrayerTimes();renderAll();setDailyQuote();renderCalendar();
  }
}

// QUOTE
function setDailyQuote(){
  const d=new Date(),q=QUOTES[(d.getFullYear()*1000+d.getMonth()*32+d.getDate())%QUOTES.length];
  document.getElementById('quoteText').textContent=q.text;
  document.getElementById('quoteSrc').textContent='— '+q.src;
}

// NAMAZ (home pills only)
function cycleStatus(s){return s==='pending'?'prayed':s==='prayed'?'missed':'pending';}
function renderNamaz(){
  const pills=document.getElementById('homePills');if(pills)pills.innerHTML='';
  let prayed=0,missed=0;
  const total=NAMAZ_LIST.filter(n=>!n.optional).length;
  const curId=getCurrentNamazId();
  NAMAZ_LIST.forEach(namaz=>{
    const status=state.namaz[namaz.id];
    if(!namaz.optional){if(status==='prayed')prayed++;if(status==='missed')missed++;}
    if(pills){
      const pill=document.createElement('div');pill.className='hnam-pill st-'+status+(namaz.id===curId?' cur':'');
      pill.textContent=namaz.name+(namaz.optional?' ✦':'');
      pill.onclick=()=>{state.namaz[namaz.id]=cycleStatus(state.namaz[namaz.id]);saveState();renderNamaz();};
      pills.appendChild(pill);
    }
  });
  const pct=Math.round((prayed/total)*100);
  document.getElementById('namazProgress').style.width=pct+'%';
  document.getElementById('namazCount').textContent=prayed+'/'+total+' prayed';
  const mc=document.getElementById('missedCount');if(mc)mc.textContent=missed>0?missed+' missed':'';
}

// DHIKR
function renderDhikr(){
  const c=document.getElementById('dhikrList');c.innerHTML='';
  state.dhikrDefs.forEach(d=>{
    const count=state.dhikr[d.id]||0,done=count>=d.target;
    const row=document.createElement('div');row.className='counter-row'+(done?' c-done':'');
    const lbl=document.createElement('div');lbl.className='c-label'+(done?' c-done':'');
    const ar=document.createElement('div');ar.className='c-arabic';ar.textContent=d.arabic;
    const me=document.createElement('div');me.className='c-meaning';me.textContent=d.meaning;
    lbl.appendChild(ar);lbl.appendChild(me);
    const ctrl=document.createElement('div');ctrl.className='c-controls';
    const minus=document.createElement('button');minus.className='c-btn';minus.textContent='−';
    minus.onclick=e=>{e.stopPropagation();if((state.dhikr[d.id]||0)>0){state.dhikr[d.id]--;saveState();renderDhikr();}};
    const vw=document.createElement('div');vw.className='c-val-wrap';
    const val=document.createElement('div');val.className='c-val'+(done?' done':'');val.textContent=count;
    const tgt=document.createElement('div');tgt.className='c-tgt';tgt.textContent='/ '+d.target;
    vw.appendChild(val);vw.appendChild(tgt);
    const plus=document.createElement('button');plus.className='c-btn';plus.textContent='+';
    plus.onclick=e=>{e.stopPropagation();state.dhikr[d.id]=(state.dhikr[d.id]||0)+1;saveState();renderDhikr();};
    ctrl.appendChild(minus);ctrl.appendChild(vw);ctrl.appendChild(plus);
    row.appendChild(lbl);row.appendChild(ctrl);c.appendChild(row);
  });
  renderTasbihPills();
}

// TASKS
function renderTasksIn(id){
  const c=document.getElementById(id);if(!c)return;c.innerHTML='';
  state.taskDefs.forEach(t=>{
    const done=!!state.tasks[t.id];
    const row=document.createElement('div');row.className='home-task-row'+(done?' done':'');
    const radio=document.createElement('div');radio.className='radio';
    const lbl=document.createElement('div');lbl.className='home-task-lbl';lbl.textContent=t.label;
    row.appendChild(radio);row.appendChild(lbl);
    row.addEventListener('click',()=>{state.tasks[t.id]=!state.tasks[t.id];saveState();renderTasksIn(id);});
    c.appendChild(row);
  });
}
function renderTasks(){renderTasksIn('homeTaskList');}
function renderAll(){updateHeader();renderStreak();renderNamaz();renderDhikr();renderTasks();}

// TASBIH
let tsbIndex=0; // -1 = custom mode
let tsbCustomText='';
let tsbCustomCount=0;

function getTsbCounts(){try{return JSON.parse(localStorage.getItem(TSB_KEY))||{};}catch{return{};}}
function saveTsbCounts(c){localStorage.setItem(TSB_KEY,JSON.stringify(c));}

function renderTasbihPills(){
  const pills=document.getElementById('tsbPills');if(!pills)return;pills.innerHTML='';
  state.dhikrDefs.forEach((d,i)=>{
    const p=document.createElement('div');p.className='tsb-pill'+(i===tsbIndex?' active':'');
    p.textContent=d.arabic.length>22?d.arabic.substring(0,22)+'…':d.arabic;
    p.onclick=()=>{tsbIndex=i;tsbCustomText='';document.getElementById('tsbCustomInput').value='';renderTasbih();};
    pills.appendChild(p);
  });
}

function applyCustomTsb(){
  const val=document.getElementById('tsbCustomInput').value.trim();
  if(!val)return;
  tsbCustomText=val;
  tsbCustomCount=0;
  tsbIndex=-1;
  // deactivate all pills
  document.querySelectorAll('.tsb-pill').forEach(p=>p.classList.remove('active'));
  renderTasbih();
}

function renderTasbih(){
  if(tsbIndex===-1){
    // custom mode
    document.getElementById('tsbName').textContent=tsbCustomText||'Custom Dhikr';
    document.getElementById('tsbMeaning').textContent='';
    document.getElementById('tsbCount').textContent=tsbCustomCount;
    document.getElementById('tsbTarget').textContent='';
    renderTasbihPills();
    return;
  }
  const d=state.dhikrDefs[tsbIndex];if(!d)return;
  const counts=getTsbCounts(),count=counts[d.id]||0;
  document.getElementById('tsbName').textContent=d.arabic;
  document.getElementById('tsbMeaning').textContent=d.meaning;
  document.getElementById('tsbCount').textContent=count;
  document.getElementById('tsbTarget').textContent=count>=d.target?'✅ Target reached!':'Target: '+d.target;
  renderTasbihPills();
}

function tsbTap(){
  if(tsbIndex===-1){
    tsbCustomCount++;
    document.getElementById('tsbCount').textContent=tsbCustomCount;
    if(navigator.vibrate)navigator.vibrate(8);
    return;
  }
  const d=state.dhikrDefs[tsbIndex];if(!d)return;
  const counts=getTsbCounts();counts[d.id]=(counts[d.id]||0)+1;
  state.dhikr[d.id]=counts[d.id];saveState();saveTsbCounts(counts);
  renderTasbih();renderDhikr();
  if(navigator.vibrate)navigator.vibrate(8);
}

function tsbUndo(){
  if(tsbIndex===-1){
    if(tsbCustomCount>0)tsbCustomCount--;
    document.getElementById('tsbCount').textContent=tsbCustomCount;
    return;
  }
  const d=state.dhikrDefs[tsbIndex];if(!d)return;
  const counts=getTsbCounts();if((counts[d.id]||0)>0){counts[d.id]--;state.dhikr[d.id]=counts[d.id];saveState();saveTsbCounts(counts);renderTasbih();renderDhikr();}
}

function tsbReset(){
  if(tsbIndex===-1){tsbCustomCount=0;document.getElementById('tsbCount').textContent=0;return;}
  const d=state.dhikrDefs[tsbIndex];if(!d)return;
  const counts=getTsbCounts();counts[d.id]=0;state.dhikr[d.id]=0;saveState();saveTsbCounts(counts);renderTasbih();renderDhikr();
}

// CALENDAR
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
const MNAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DNAMES=['Su','Mo','Tu','We','Th','Fr','Sa'];
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function renderCalendar(){
  const hist=loadHistory(),today=new Date();
  document.getElementById('calTitle').textContent=MNAMES[calMonth]+' '+calYear;
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  DNAMES.forEach(d=>{const el=document.createElement('div');el.className='cal-day-label';el.textContent=d;grid.appendChild(el);});
  const firstDay=new Date(calYear,calMonth,1).getDay(),daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<firstDay;i++){const el=document.createElement('div');el.className='cal-cell empty';grid.appendChild(el);}
  for(let d=1;d<=daysInMonth;d++){
    const key=calYear+'-'+calMonth+'-'+d;
    const isToday=d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
    const cell=document.createElement('div');cell.className='cal-cell'+(isToday?' today':'');
    cell.appendChild(Object.assign(document.createElement('div'),{textContent:d}));
    const rec=hist[key];
    if(rec){const dots=document.createElement('div');dots.className='cal-dots';const dot=document.createElement('div');dot.className='cal-dot '+(rec.prayed===rec.total?'dot-green':rec.missed>0?'dot-red':'dot-grey');dots.appendChild(dot);cell.appendChild(dots);}
    grid.appendChild(cell);
  }
}

// JOURNAL
function loadJournal(){try{return JSON.parse(localStorage.getItem(JOURNAL_KEY))||[];}catch{return[];}}
function saveJournal(j){localStorage.setItem(JOURNAL_KEY,JSON.stringify(j));}
function saveJournalEntry(){
  const text=document.getElementById('journalTextarea').value.trim();if(!text)return;
  const now=new Date(),j=loadJournal();
  j.unshift({id:Date.now(),date:ORD(now.getDate())+' '+MONTHS[now.getMonth()]+' '+now.getFullYear(),text});
  saveJournal(j);document.getElementById('journalTextarea').value='';renderJournal();
}
function deleteJournalEntry(id){saveJournal(loadJournal().filter(e=>e.id!==id));renderJournal();}
function renderJournal(){
  const entries=loadJournal(),c=document.getElementById('journalEntries');c.innerHTML='';
  if(!entries.length){c.innerHTML='<div class="journal-empty">No entries yet. Write your first dua or reflection ✍️</div>';return;}
  entries.forEach(e=>{
    const div=document.createElement('div');div.className='journal-entry';
    div.innerHTML='<div class="je-date">'+e.date+'</div><div class="je-text">'+escHtml(e.text)+'</div>';
    const del=document.createElement('button');del.className='je-del';del.textContent='🗑 Delete';del.onclick=()=>deleteJournalEntry(e.id);
    div.appendChild(del);c.appendChild(div);
  });
}

// NAV
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');btn.classList.add('active');
  if(name==='tasbih')renderTasbih();
  if(name==='calendar')renderCalendar();
  if(name==='journal')renderJournal();
}

// MODALS
let editDhikr=[];
function openDhikrModal(){editDhikr=state.dhikrDefs.map(d=>(({...d})));buildDhikrEdit();document.getElementById('dhikrModal').classList.add('open');}
function closeDhikrModal(){document.getElementById('dhikrModal').classList.remove('open');}
function buildDhikrEdit(){
  const c=document.getElementById('dhikrEditList');c.innerHTML='';
  editDhikr.forEach((d,i)=>{
    const item=document.createElement('div');item.className='m-item';
    item.innerHTML='<label>Dhikr Text</label><input type="text" value="'+esc(d.arabic)+'" oninput="editDhikr['+i+'].arabic=this.value"><label>Meaning</label><input type="text" value="'+esc(d.meaning)+'" oninput="editDhikr['+i+'].meaning=this.value"><label>Target</label><input type="number" value="'+d.target+'" min="1" oninput="editDhikr['+i+'].target=parseInt(this.value)||1"><div class="m-actions"><button class="del-btn" onclick="delDhikr('+i+')">🗑 Remove</button></div>';
    c.appendChild(item);
  });
}
function addDhikrItem(){editDhikr.push({id:'dh_'+Date.now(),arabic:'',meaning:'',target:33});buildDhikrEdit();}
function delDhikr(i){editDhikr.splice(i,1);buildDhikrEdit();}
function saveDhikr(){
  const v=editDhikr.filter(d=>d.arabic.trim());state.dhikrDefs=v;
  v.forEach(d=>{if(state.dhikr[d.id]===undefined)state.dhikr[d.id]=0;});
  saveState();renderDhikr();closeDhikrModal();
}
let editTasks=[];
function openTaskModal(){editTasks=state.taskDefs.map(t=>(({...t})));buildTaskEdit();document.getElementById('taskModal').classList.add('open');}
function closeTaskModal(){document.getElementById('taskModal').classList.remove('open');}
function buildTaskEdit(){
  const c=document.getElementById('taskEditList');c.innerHTML='';
  editTasks.forEach((t,i)=>{
    const item=document.createElement('div');item.className='m-item';
    item.innerHTML='<label>Task Name</label><input type="text" value="'+esc(t.label)+'" oninput="editTasks['+i+'].label=this.value"><div class="m-actions"><button class="del-btn" onclick="delTask('+i+')">🗑 Remove</button></div>';
    c.appendChild(item);
  });
}
function addTaskItem(){editTasks.push({id:'task_'+Date.now(),label:''});buildTaskEdit();}
function delTask(i){editTasks.splice(i,1);buildTaskEdit();}
function saveTasksModal(){
  const v=editTasks.filter(t=>t.label.trim());state.taskDefs=v;
  v.forEach(t=>{if(state.tasks[t.id]===undefined)state.tasks[t.id]=false;});
  saveState();renderTasks();closeTaskModal();
}

// RESET
function showConfirm(){document.getElementById('confirmBox').classList.add('vis');}
function hideConfirm(){document.getElementById('confirmBox').classList.remove('vis');}
function doReset(){
  const n={},dh={},tk={};
  NAMAZ_LIST.forEach(x=>n[x.id]='pending');
  state.dhikrDefs.forEach(x=>dh[x.id]=0);
  state.taskDefs.forEach(x=>tk[x.id]=false);
  state.namaz=n;state.dhikr=dh;state.tasks=tk;
  saveState();renderAll();hideConfirm();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.getElementById('dhikrModal').addEventListener('click',function(e){if(e.target===this)closeDhikrModal();});
document.getElementById('taskModal').addEventListener('click',function(e){if(e.target===this)closeTaskModal();});

setDailyQuote();
renderAll();
renderJournal();
renderCalendar();
initPrayerTimes();
setInterval(()=>{updateHeader();checkMidnight();updateCountdown();},1000);
setInterval(()=>{if(ptLoaded)renderNamaz();},60000);
</script>
