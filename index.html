<meta name="apple-mobile-web-app-capable" content="yes">

<title>Daily Tracker</title>
<style>
:root{
  --bg:#0a0a0a;--card:#141414;--card2:#1c1c1c;--border:#252525;
  --text:#f0f0f0;--muted:#555;--gold:#c8a84b;--accent:#3dd6b5;
  --red:#e05c5c;--green:#3dd6b5;--weekend:#e07a70;--hi:#1a3330;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;scrollbar-width:none;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;}
.frame{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;}
.page{display:none;flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.page::-webkit-scrollbar{display:none;}
.page.active{display:flex;flex-direction:column;}

/* NAV */
.nav{background:var(--card);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;}
.nt{flex:1;padding:9px 0 11px;text-align:center;border:none;background:none;cursor:pointer;color:var(--muted);transition:color 0.2s;}
.nt svg{display:block;margin:0 auto 3px;}
.nt span{font-size:9px;letter-spacing:0.3px;}
.nt.active{color:var(--accent);}

/* ══ HOME ══ */
#page-home{padding:20px 16px 16px;gap:10px;}
.home-header{display:flex;justify-content:space-between;align-items:flex-start;}
.home-date-main{font-family:Georgia,serif;font-size:22px;font-weight:700;letter-spacing:-0.3px;line-height:1.1;}
.home-date-main .dn{text-decoration:underline;font-style:italic;}
.home-dtype{font-size:11px;font-weight:600;margin-top:3px;letter-spacing:0.5px;text-transform:uppercase;}
.home-dtype.weekday{color:var(--accent);}
.home-dtype.weekend{color:var(--weekend);}
.home-sub{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.7;}
.clock-hm{font-family:Georgia,serif;font-size:40px;font-weight:700;color:var(--accent);letter-spacing:-1px;line-height:1;text-align:right;}
.clock-s{font-size:12px;color:var(--muted);text-align:right;margin-top:2px;}

/* Quote — now above namaz */
.quote-block{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;gap:10px;}
.qm{font-family:Georgia,serif;font-size:28px;line-height:1;color:var(--accent);opacity:0.3;flex-shrink:0;margin-top:-3px;}
.qt{font-family:Georgia,serif;font-size:12px;font-style:italic;line-height:1.6;color:var(--text);}
.qs{font-size:10px;color:var(--muted);margin-top:4px;}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 14px 12px;}
.card-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;}
.card-val{font-family:Georgia,serif;font-size:22px;font-weight:700;color:var(--gold);line-height:1;}
.card-sub{font-size:11px;color:var(--accent);margin-top:5px;font-weight:500;}

.namaz-block{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;}
.block-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.block-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;}
.missed-lbl{font-size:10px;color:var(--red);font-weight:600;}
.pills{display:flex;gap:5px;flex-wrap:wrap;}
.pill{font-size:11px;padding:5px 11px;border-radius:20px;cursor:pointer;font-weight:500;border:1px solid transparent;transition:all 0.15s;}
.pill.st-pending{background:var(--card2);color:var(--muted);}
.pill.st-prayed{background:rgba(61,214,181,0.12);color:var(--green);border-color:rgba(61,214,181,0.2);}
.pill.st-missed{background:rgba(224,92,92,0.1);color:var(--red);border-color:rgba(224,92,92,0.2);}
.pill.cur{border-color:var(--accent)!important;}
.pbar{height:2px;background:var(--border);border-radius:2px;margin-top:10px;}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),#5ee8cc);transition:width 0.4s;border-radius:2px;}

.tasks-block{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.tasks-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 10px;border-bottom:1px solid var(--border);}
.tasks-hdr-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;}
.edt{background:none;border:none;color:var(--accent);font-size:11px;cursor:pointer;padding:0;}
.trow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;}
.trow:last-child{border-bottom:none;}
.trow:active{background:var(--card2);}
.chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.trow.done .chk{background:var(--accent);border-color:var(--accent);}
.trow.done .chk::after{content:"";width:5px;height:4px;border-left:1.5px solid #000;border-bottom:1.5px solid #000;transform:rotate(-45deg) translateY(-1px);}
.tlbl{font-size:13px;flex:1;}
.trow.done .tlbl{color:var(--muted);text-decoration:line-through;}

/* ══ DHIKR ══ */
#page-dhikr{padding:20px 16px;gap:0;}
.page-title{font-family:Georgia,serif;font-size:20px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.dlist{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.drow{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.drow:last-child{border-bottom:none;}
.dlbl{flex:1;min-width:120px;}
.dar{font-family:Georgia,serif;font-size:13px;line-height:1.4;word-break:break-word;}
.dme{font-size:10px;color:var(--muted);font-style:italic;margin-top:2px;line-height:1.4;word-break:break-word;}
.done-row .dar{color:var(--muted);text-decoration:line-through;}
.dctr{display:flex;align-items:center;background:var(--card2);border:1px solid var(--border);border-radius:12px;overflow:hidden;flex-shrink:0;}
.db{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none;}
.db:active{background:rgba(255,255,255,0.05);}
.dvw{display:flex;flex-direction:column;align-items:center;min-width:42px;border-left:1px solid var(--border);border-right:1px solid var(--border);padding:4px 2px;}
.dv{font-family:Georgia,serif;font-size:16px;font-weight:700;color:var(--gold);line-height:1;}
.dv.done{color:var(--green);}
.dtg{font-size:9px;color:var(--muted);margin-top:1px;}
.dreset{text-align:center;padding:20px 0 4px;}
.rbtn{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:6px 18px;border-radius:20px;cursor:pointer;}
.cbox{display:none;margin:8px 0 0;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;font-size:13px;}
.cbox.vis{display:block;}
.cacts{display:flex;gap:8px;justify-content:center;margin-top:10px;}
.cyes{background:rgba(224,92,92,0.12);border:1px solid var(--red);color:var(--red);padding:5px 18px;border-radius:20px;font-size:12px;cursor:pointer;}
.cno{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 18px;border-radius:20px;font-size:12px;cursor:pointer;}

/* ══ TASBIH ══ */
#page-tasbih{padding:20px 16px;gap:14px;align-items:center;justify-content:center;}
.tsb-title{font-family:Georgia,serif;font-size:20px;font-weight:700;text-align:center;width:100%;}
.tsb-pills-wrap{width:100%;}
.tsb-pills-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;text-align:center;margin-bottom:8px;}
.tsb-pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.tpill{background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 13px;border-radius:20px;cursor:pointer;transition:all 0.15s;}
.tpill.active{background:var(--hi);border-color:var(--accent);color:var(--accent);}
.tsb-custom{width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;}
.tsb-custom-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;}
.tsb-custom-row{display:flex;gap:8px;}
.tsb-input{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:8px 11px;border-radius:10px;outline:none;}
.tsb-input:focus{border-color:var(--accent);}
.tsb-use{background:var(--accent);border:none;color:#000;font-size:12px;font-weight:700;padding:8px 14px;border-radius:10px;cursor:pointer;white-space:nowrap;}
.tsb-info{text-align:center;}
.tsb-name{font-family:Georgia,serif;font-size:15px;color:var(--text);}
.tsb-meaning{font-size:11px;color:var(--muted);font-style:italic;margin-top:2px;}
.tsb-circle{width:185px;height:185px;border-radius:50%;background:var(--hi);border:2px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.08s,background 0.1s;-webkit-user-select:none;user-select:none;gap:4px;}
.tsb-circle:active{transform:scale(0.92);background:rgba(61,214,181,0.15);}
.tsb-num{font-family:Georgia,serif;font-size:64px;font-weight:700;color:var(--accent);line-height:1;}
.tsb-tap-lbl{font-size:10px;color:var(--muted);letter-spacing:0.5px;}
.tsb-tgt{font-size:11px;color:var(--muted);}
.tsb-btns{display:flex;gap:10px;}
.tsb-btn{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:12px;padding:8px 22px;border-radius:20px;cursor:pointer;}
.tsb-btn.red{border-color:rgba(224,92,92,0.3);color:var(--red);}

/* ══ CALENDAR — full page immersive ══ */
#page-calendar{padding:0;gap:0;background:var(--bg);}
.cal-hero{padding:28px 20px 20px;background:linear-gradient(160deg,#0f2420 0%,var(--bg) 100%);flex-shrink:0;}
.cal-hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.cal-month-name{font-family:Georgia,serif;font-size:28px;font-weight:700;color:var(--text);}
.cal-year{font-size:13px;color:var(--muted);margin-top:2px;}
.cal-nav-row{display:flex;gap:8px;}
.cal-nav{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.cal-nav:active{background:rgba(255,255,255,0.12);}
.cal-stats{display:flex;gap:10px;margin-top:16px;}
.cal-stat{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:10px 12px;text-align:center;}
.cal-stat-val{font-family:Georgia,serif;font-size:20px;font-weight:700;color:var(--accent);}
.cal-stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.cal-body{flex:1;padding:16px 16px 20px;}
.cal-day-row{display:grid;grid-template-columns:repeat(7,1fr);gap:0;margin-bottom:6px;}
.cdlbl{text-align:center;font-size:9px;color:var(--muted);letter-spacing:0.8px;padding:0 0 8px;text-transform:uppercase;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cc{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;color:var(--muted);position:relative;cursor:default;}
.cc.has-data{color:var(--text);}
.cc.today{background:var(--hi);color:var(--accent);font-weight:700;border:1px solid rgba(61,214,181,0.4);}
.cc.empty{opacity:0;pointer-events:none;}
.cc-num{font-size:13px;line-height:1;}
.cc-dot{width:5px;height:5px;border-radius:50%;margin-top:3px;}
.cc-dot.dg{background:var(--green);}
.cc-dot.dr{background:var(--red);}
.cc-dot.dm{background:#444;}
.cal-legend{display:flex;gap:16px;justify-content:center;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);}
.cal-legend span{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);}
.ldot{width:7px;height:7px;border-radius:50%;display:inline-block;}

/* ══ JOURNAL — beautiful writer ══ */
#page-journal{padding:0;gap:0;}
.j-top{padding:24px 20px 0;flex-shrink:0;}
.j-top-date{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
.j-top-title{font-family:Georgia,serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:18px;}
.j-compose{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin:0 16px;flex-shrink:0;}
.j-compose-header{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.j-compose-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);opacity:0.6;}
.j-compose-hint{font-size:11px;color:var(--muted);font-style:italic;}
.j-ta{width:100%;background:transparent;border:none;color:var(--text);font-size:15px;line-height:1.8;resize:none;outline:none;min-height:110px;padding:14px 16px;font-family:Georgia,serif;}
.j-ta::placeholder{color:var(--muted);font-style:italic;}
.j-compose-footer{display:flex;justify-content:flex-end;padding:10px 14px 12px;border-top:1px solid var(--border);}
.j-save{background:var(--accent);border:none;color:#000;font-size:12px;font-weight:700;padding:8px 20px;border-radius:20px;cursor:pointer;letter-spacing:0.3px;}
.j-divider{display:flex;align-items:center;gap:12px;padding:16px 20px;flex-shrink:0;}
.j-divider-line{flex:1;height:1px;background:var(--border);}
.j-divider-text{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;}
.j-entries{padding:0 16px 24px;display:flex;flex-direction:column;gap:10px;}
.je{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.je-header{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.je-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0.5;flex-shrink:0;}
.je-d{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;}
.je-body{padding:12px 16px;}
.je-t{font-family:Georgia,serif;font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap;}
.je-footer{padding:8px 16px 12px;display:flex;justify-content:flex-end;}
.je-del{background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;letter-spacing:0.3px;}
.je-del:hover{color:var(--red);}
.j-empty{text-align:center;color:var(--muted);font-size:13px;padding:32px 20px;font-family:Georgia,serif;font-style:italic;}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:flex-end;justify-content:center;}
.mov.open{display:flex;}
.modal{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:430px;padding:20px 18px 48px;max-height:88vh;overflow-y:auto;scrollbar-width:none;}
.modal::-webkit-scrollbar{display:none;}
.mtitle{font-family:Georgia,serif;font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.mclose{background:var(--card2);border:none;color:var(--text);width:26px;height:26px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mi{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
.mi label{display:block;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;margin-top:8px;}
.mi label:first-child{margin-top:0;}
.mi input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:13px;padding:7px 10px;border-radius:8px;outline:none;}
.mi input[type=number]{width:75px;}
.mi input:focus{border-color:var(--accent);}
.mi-del{margin-top:8px;}
.del-b{background:rgba(224,92,92,0.08);border:1px solid rgba(224,92,92,0.25);color:var(--red);font-size:11px;padding:4px 12px;border-radius:12px;cursor:pointer;}
.add-b{display:block;width:100%;background:rgba(61,214,181,0.06);border:1px dashed rgba(61,214,181,0.3);color:var(--accent);font-size:13px;padding:10px;border-radius:12px;cursor:pointer;margin-top:4px;text-align:center;}
.sav-b{display:block;width:100%;background:var(--accent);border:none;color:#000;font-size:14px;font-weight:700;padding:12px;border-radius:12px;cursor:pointer;margin-top:12px;letter-spacing:0.3px;}
</style>
</head>
<body>
<div class="frame">

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="home-header">
    <div>
      <div class="home-date-main" id="dateDisplay"></div>
      <div class="home-dtype" id="dayType"></div>
      <div class="home-sub" id="homeSubLine"></div>
    </div>
    <div>
      <div class="clock-hm" id="homeClock"></div>
      <div class="clock-s" id="homeClockSec"></div>
    </div>

  <!-- Quote ABOVE namaz -->

  <div class="cards">

    <div class="tasks-hdr">
      <div class="tasks-hdr-title">Daily Tasks</div>

<!-- DHIKR -->
<div class="page" id="page-dhikr">

    Dhikr
    <button class="edt" onclick="openDhikrModal()">Edit</button>

    <div class="dlist" id="dhikrList"></div>

    <div class="cbox" id="confirmBox">
      Reset all items for today?
      <div class="cacts">
        <button class="cyes" onclick="doReset()">Reset</button>
        <button class="cno" onclick="hideConfirm()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- TASBIH -->

  <div class="tsb-title">Tasbih</div>
  <div class="tsb-pills-wrap">
    <div class="tsb-pills-lbl">From your dhikr</div>
    <div class="tsb-pills" id="tsbPills"></div>

  <div class="tsb-custom">
    <div class="tsb-custom-lbl">Custom — type without saving</div>
    <div class="tsb-custom-row">
      <input class="tsb-input" id="tsbCustomInput" placeholder="e.g. Astaghfirullah...">
      <button class="tsb-use" onclick="applyCustomTsb()">Use</button>

    <div class="tsb-name" id="tsbName"></div>

    <div class="tsb-num" id="tsbCount">0</div>
    <div class="tsb-tap-lbl">tap to count</div>
  </div>
  <div class="tsb-tgt" id="tsbTarget"></div>
  <div class="tsb-btns">
    <button class="tsb-btn" onclick="tsbUndo()">↩ Undo</button>
    <button class="tsb-btn red" onclick="tsbReset()">↺ Reset</button>
  </div>
</div>

<!-- CALENDAR -->
<div class="page" id="page-calendar">
  <div class="cal-hero">
    <div class="cal-hero-top">
      <div>
        <div class="cal-month-name" id="calMonthName"></div>
        <div class="cal-year" id="calYear"></div>
      </div>
      <div class="cal-nav-row">
        <button class="cal-nav" onclick="calPrev()">‹</button>
        <button class="cal-nav" onclick="calNext()">›</button>

    <div class="cal-stats" id="calStats"></div>
  </div>
  <div class="cal-body">
    <div class="cal-day-row" id="calDayRow"></div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-legend">
      <span><span class="ldot" style="background:var(--green)"></span>All 5 prayed</span>
      <span><span class="ldot" style="background:var(--red)"></span>Missed</span>

</div>

<!-- JOURNAL -->
<div class="page" id="page-journal">

  <div class="j-entries" id="journalEntries"></div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nt active" onclick="showPage('home',this)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

  </button>
  <button class="nt" onclick="showPage('dhikr',this)">

  <button class="nt" onclick="showPage('calendar',this)">

<script>
const QUOTES=[
  {text:"Verily, with hardship comes ease.",src:"Quran 94:5"},
  {text:"Allah does not burden a soul beyond that it can bear.",src:"Quran 2:286"},
  {text:"Whoever puts their trust in Allah, He will be enough for them.",src:"Quran 65:3"},
  {text:"Indeed, Allah is with the patient.",src:"Quran 2:153"},
  {text:"Speak good or remain silent.",src:"Prophet Muhammad ﷺ"},
  {text:"The best of people are those most beneficial to people.",src:"Prophet Muhammad ﷺ"},
  {text:"Make things easy, do not make them difficult.",src:"Prophet Muhammad ﷺ"},
  {text:"None of you truly believes until he loves for his brother what he loves for himself.",src:"Prophet Muhammad ﷺ"},
  {text:"So remember Me; I will remember you.",src:"Quran 2:152"},
  {text:"My mercy encompasses all things.",src:"Quran 7:156"},
  {text:"Call upon Me; I will respond to you.",src:"Quran 40:60"},
  {text:"And He found you lost and guided you.",src:"Quran 93:7"},
  {text:"Every act of kindness is charity.",src:"Prophet Muhammad ﷺ"},
  {text:"Cleanliness is half of faith.",src:"Prophet Muhammad ﷺ"},
  {text:"The most beloved deeds are those done consistently, even if small.",src:"Prophet Muhammad ﷺ"},
  {text:"Allah is beautiful and loves beauty.",src:"Prophet Muhammad ﷺ"},
  {text:"Do not lose hope in the mercy of Allah.",src:"Quran 39:53"},
  {text:"Prayer prohibits immorality and wrongdoing.",src:"Quran 29:45"},
  {text:"He knows what is in every heart.",src:"Quran 67:13"},
  {text:"Smile at your brother — it is charity.",src:"Prophet Muhammad ﷺ"},
  {text:"The strong man controls himself when angry.",src:"Prophet Muhammad ﷺ"},
  {text:"Whoever is not thankful to people is not thankful to Allah.",src:"Prophet Muhammad ﷺ"},
  {text:"Verily, the promise of Allah is truth.",src:"Quran 31:33"},
  {text:"Take benefit of five before five: youth, health, wealth, free time, and life.",src:"Prophet Muhammad ﷺ"},
  {text:"Make du'a in a state of certainty that it will be answered.",src:"Prophet Muhammad ﷺ"},
];

const NL=[
  {id:'tahajjud',name:'Tahajjud',opt:true,ak:null},
  {id:'fajr',name:'Fajr',opt:false,ak:'Fajr'},
  {id:'zohar',name:'Zohar',opt:false,ak:'Dhuhr'},
  {id:'asr',name:'Asr',opt:false,ak:'Asr'},
  {id:'maghrib',name:'Maghrib',opt:false,ak:'Maghrib'},
  {id:'isha',name:'Isha',opt:false,ak:'Isha'},
];
const DD=[
  {id:'rabbi_inni',arabic:'Rabbi Inni Lima Anzalta Ilayya Min Khairin Faqir',meaning:'"My Lord, I am truly in great need of Your good"',target:100},
  {id:'subhanallah',arabic:'SubhanAllah',meaning:'Glory be to Allah',target:33},
  {id:'alhamdulillah',arabic:'Alhamdulillah',meaning:'All praise is due to Allah',target:33},
  {id:'allahuakbar',arabic:'Allahu Akbar',meaning:'Allah is the Greatest',target:34},
];
const DT=[
  {id:'tahajjud_check',label:'Tahajjud prayer completed'},
  {id:'quran',label:'Quran recitation'},
  {id:'fasting',label:'Fasting / Sunnah fast'},
];

const SK='dt_v9',SKS='dt_str2',SKH='dt_his1',SKJ='dt_jou1',SKT='dt_tsb1';

function td(){const d=new Date();return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();}
function yd(){const d=new Date();d.setDate(d.getDate()-1);return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();}

function defState(dd,dt){
  dd=dd||DD;dt=dt||DT;
  const n={},dh={},tk={};
  NL.forEach(x=>n[x.id]='pending');
  dd.forEach(x=>dh[x.id]=0);dt.forEach(x=>tk[x.id]=false);
  return {date:td(),namaz:n,dhikr:dh,tasks:tk,dhikrDefs:dd,taskDefs:dt};
}
function loadS(){
  try{const r=localStorage.getItem(SK);if(!r)return null;const o=JSON.parse(r);if(o.date!==td()){streakCheck(o);histSave(o);return defState(o.dhikrDefs,o.taskDefs);}return o;}catch{return null;}
}
let S=loadS()||defState();
if(!S.dhikrDefs)S.dhikrDefs=DD;if(!S.taskDefs)S.taskDefs=DT;
function save(){localStorage.setItem(SK,JSON.stringify(S));}

function loadStreak(){try{return JSON.parse(localStorage.getItem(SKS))||{c:0,d:''};}catch{return{c:0,d:''};}}
function saveStreak(s){localStorage.setItem(SKS,JSON.stringify(s));}
function streakCheck(old){
  const s=loadStreak(),tot=NL.filter(x=>!x.opt).length;
  const pr=NL.filter(x=>!x.opt&&old.namaz[x.id]==='prayed').length;
  s.c=(pr===tot)?(s.d===yd()?s.c+1:1):0;s.d=td();saveStreak(s);
}
function renderStreak(){document.getElementById('streakNum').textContent=loadStreak().c;}

function loadHist(){try{return JSON.parse(localStorage.getItem(SKH))||{};}catch{return{};}}
function histSave(old){
  const h=loadHist(),tot=NL.filter(x=>!x.opt).length;
  const pr=NL.filter(x=>!x.opt&&old.namaz[x.id]==='prayed').length;
  const mi=NL.filter(x=>!x.opt&&old.namaz[x.id]==='missed').length;
  h[old.date]={pr,mi,tot};localStorage.setItem(SKH,JSON.stringify(h));
}

function hijri(date){
  const JD=Math.floor((date.getTime()/86400000)+2440587.5);
  const l=JD-1948440+10632,n=Math.floor((l-1)/10631),l2=l-10631*n+354;
  const j=Math.floor((10985-l2)/5316)*Math.floor((50*l2)/17719)+Math.floor(l2/5670)*Math.floor((43*l2)/15238);
  const l3=l2-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29;
  const mo=Math.floor((24*l3)/709),dy=l3-Math.floor((709*mo)/24),yr=30*n+j-30;
  const HM=['Muharram','Safar','Rabi al-Awwal','Rabi al-Thani','Jumada al-Ula','Jumada al-Akhirah','Rajab',"Sha'ban",'Ramadan','Shawwal',"Dhu al-Qi'dah",'Dhu al-Hijjah'];
  return dy+' '+HM[mo-1]+' '+yr+' AH';
}

let PT={},ptOK=false,city='';
function initPT(){
  const sv=localStorage.getItem('dt_city');if(sv)city=sv;
  if(!navigator.geolocation){ptOK=true;renderNamaz();cdUpdate();return;}
  navigator.geolocation.getCurrentPosition(p=>{fetchPT(p.coords.latitude,p.coords.longitude);if(!city)fetchCity(p.coords.latitude,p.coords.longitude);},()=>{ptOK=true;renderNamaz();cdUpdate();},{timeout:8000});
}
function fetchCity(lat,lon){
  fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json')
    .then(r=>r.json()).then(d=>{const a=d.address,c=a.city||a.town||a.village||'',cc=a.country_code?a.country_code.toUpperCase():'';if(!city&&c){city=[c,cc].filter(Boolean).join(', ');subLine();}}).catch(()=>{});
}
function fetchPT(lat,lon){
  const d=new Date();
  fetch('https://api.aladhan.com/v1/timings/'+String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear()+'?latitude='+lat+'&longitude='+lon+'&method=2')
    .then(r=>r.json()).then(x=>{if(x.code===200)PT=x.data.timings;ptOK=true;renderNamaz();cdUpdate();}).catch(()=>{ptOK=true;renderNamaz();cdUpdate();});
}
function tm(s){if(!s)return 0;const[h,m]=s.split(' ')[0].split(':').map(Number);return h*60+m;}
function curNamaz(){
  if(!ptOK||!Object.keys(PT).length)return null;
  const now=new Date(),nm=now.getHours()*60+now.getMinutes();
  if(nm<tm(PT.Fajr))return'tahajjud';
  const w=[{id:'fajr',m:tm(PT.Fajr)},{id:'zohar',m:tm(PT.Dhuhr)},{id:'asr',m:tm(PT.Asr)},{id:'maghrib',m:tm(PT.Maghrib)},{id:'isha',m:tm(PT.Isha)}];
  for(let i=w.length-1;i>=0;i--)if(nm>=w[i].m)return w[i].id;return null;
}
function cdUpdate(){
  if(!ptOK||!Object.keys(PT).length){document.getElementById('cdPrayer').textContent='Locating...';document.getElementById('cdTime').textContent='--:--';return;}
  const nm=new Date().getHours()*60+new Date().getMinutes();
  const ord=[{n:'Fajr',k:'Fajr'},{n:'Zohar',k:'Dhuhr'},{n:'Asr',k:'Asr'},{n:'Maghrib',k:'Maghrib'},{n:'Isha',k:'Isha'}];
  let nn='',nv=Infinity;
  for(const p of ord){const v=tm(PT[p.k]);if(v>nm&&v<nv){nv=v;nn=p.n;}}
  if(!nn){nn='Fajr (tmrw)';nv=tm(PT.Fajr)+1440;}
  const d=nv-nm,h=Math.floor(d/60),m=d%60;
  document.getElementById('cdPrayer').textContent=nn;
  document.getElementById('cdTime').textContent=h>0?h+'h '+m+'m':m+'m';
}

const MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DA=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const ORD=n=>n+(n%10===1&&n!==11?'st':n%10===2&&n!==12?'nd':n%10===3&&n!==13?'rd':'th');

function subLine(){
  const p=['🌙 '+hijri(new Date())];
  if(city)p.push('📍 '+city);
  document.getElementById('homeSubLine').textContent=p.join('  ');
}
function updateHeader(){
  const now=new Date(),dy=now.getDay(),we=dy===0||dy===6;
  document.getElementById('dateDisplay').innerHTML=ORD(now.getDate())+' '+MO[now.getMonth()]+' — <span class="dn">'+DA[dy]+'</span>';
  const dt=document.getElementById('dayType');dt.textContent=we?'Weekend':'Weekday';dt.className='home-dtype '+(we?'weekend':'weekday');
  const hh=String(now.getHours()).padStart(2,'0'),mm=String(now.getMinutes()).padStart(2,'0'),ss=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('homeClock').textContent=hh+':'+mm;
  document.getElementById('homeClockSec').textContent=':'+ss;
  const now2=new Date();
  document.getElementById('journalDateLabel').textContent=ORD(now2.getDate())+' '+MO[now2.getMonth()]+' '+now2.getFullYear();
  subLine();
}

let lastD=td();
function midCheck(){
  const c=td();
  if(c!==lastD){histSave(S);lastD=c;S=defState(S.dhikrDefs,S.taskDefs);save();PT={};ptOK=false;initPT();renderAll();setQuote();renderCal();}
}

function setQuote(){
  const d=new Date(),q=QUOTES[(d.getFullYear()*1000+d.getMonth()*32+d.getDate())%QUOTES.length];
  document.getElementById('quoteText').textContent=q.text;
  document.getElementById('quoteSrc').textContent='— '+q.src;
}

function cycle(s){return s==='pending'?'prayed':s==='prayed'?'missed':'pending';}
function renderNamaz(){
  const pills=document.getElementById('homePills');if(pills)pills.innerHTML='';
  let pr=0,mi=0;const tot=NL.filter(x=>!x.opt).length;const cur=curNamaz();
  NL.forEach(x=>{
    const st=S.namaz[x.id];if(!x.opt){if(st==='prayed')pr++;if(st==='missed')mi++;}
    if(pills){
      const p=document.createElement('div');p.className='pill st-'+st+(x.id===cur?' cur':'');
      p.textContent=x.name+(x.opt?' ✦':'');
      p.onclick=()=>{S.namaz[x.id]=cycle(S.namaz[x.id]);save();renderNamaz();};
      pills.appendChild(p);
    }
  });
  document.getElementById('namazProgress').style.width=Math.round((pr/tot)*100)+'%';
  document.getElementById('namazCount').textContent=pr+' / '+tot+' prayed';
  const mc=document.getElementById('missedCount');if(mc)mc.textContent=mi>0?mi+' missed':'';
}

function renderDhikr(){
  const c=document.getElementById('dhikrList');c.innerHTML='';
  S.dhikrDefs.forEach(d=>{
    const cnt=S.dhikr[d.id]||0,dn=cnt>=d.target;
    const row=document.createElement('div');row.className='drow'+(dn?' done-row':'');
    const lb=document.createElement('div');lb.className='dlbl';
    const ar=document.createElement('div');ar.className='dar';ar.textContent=d.arabic;
    const me=document.createElement('div');me.className='dme';me.textContent=d.meaning;
    lb.appendChild(ar);lb.appendChild(me);
    const ct=document.createElement('div');ct.className='dctr';
    const mn=document.createElement('button');mn.className='db';mn.textContent='−';
    mn.onclick=e=>{e.stopPropagation();if((S.dhikr[d.id]||0)>0){S.dhikr[d.id]--;save();renderDhikr();}};
    const vw=document.createElement('div');vw.className='dvw';
    const vl=document.createElement('div');vl.className='dv'+(dn?' done':'');vl.textContent=cnt;
    const tg=document.createElement('div');tg.className='dtg';tg.textContent='/'+d.target;
    vw.appendChild(vl);vw.appendChild(tg);
    const pl=document.createElement('button');pl.className='db';pl.textContent='+';
    pl.onclick=e=>{e.stopPropagation();S.dhikr[d.id]=(S.dhikr[d.id]||0)+1;save();renderDhikr();};
    ct.appendChild(mn);ct.appendChild(vw);ct.appendChild(pl);
    row.appendChild(lb);row.appendChild(ct);c.appendChild(row);
  });
  renderTsbPills();
}

function renderTasksIn(id){
  const c=document.getElementById(id);if(!c)return;c.innerHTML='';
  S.taskDefs.forEach(t=>{
    const dn=!!S.tasks[t.id];
    const row=document.createElement('div');row.className='trow'+(dn?' done':'');
    const chk=document.createElement('div');chk.className='chk';
    const lb=document.createElement('div');lb.className='tlbl';lb.textContent=t.label;
    row.appendChild(chk);row.appendChild(lb);
    row.addEventListener('click',()=>{S.tasks[t.id]=!S.tasks[t.id];save();renderTasksIn(id);});
    c.appendChild(row);
  });
}
function renderTasks(){renderTasksIn('homeTaskList');}
function renderAll(){updateHeader();renderStreak();renderNamaz();renderDhikr();renderTasks();}

// TASBIH
let tsbIdx=0,tsbCustom='',tsbCustomCnt=0;
function getTsb(){try{return JSON.parse(localStorage.getItem(SKT))||{};}catch{return{};}}
function saveTsb(c){localStorage.setItem(SKT,JSON.stringify(c));}
function renderTsbPills(){
  const p=document.getElementById('tsbPills');if(!p)return;p.innerHTML='';
  S.dhikrDefs.forEach((d,i)=>{
    const el=document.createElement('div');el.className='tpill'+(i===tsbIdx&&!tsbCustom?' active':'');
    el.textContent=d.arabic.length>20?d.arabic.substring(0,20)+'…':d.arabic;
    el.onclick=()=>{tsbIdx=i;tsbCustom='';document.getElementById('tsbCustomInput').value='';renderTsb();};
    p.appendChild(el);
  });
}
function applyCustomTsb(){
  const v=document.getElementById('tsbCustomInput').value.trim();if(!v)return;
  tsbCustom=v;tsbCustomCnt=0;tsbIdx=-1;
  document.querySelectorAll('.tpill').forEach(x=>x.classList.remove('active'));
  renderTsb();
}
function renderTsb(){
  if(tsbCustom){
    document.getElementById('tsbName').textContent=tsbCustom;
    document.getElementById('tsbMeaning').textContent='';
    document.getElementById('tsbCount').textContent=tsbCustomCnt;
    document.getElementById('tsbTarget').textContent='';
    renderTsbPills();return;
  }
  if(tsbIdx<0||tsbIdx>=S.dhikrDefs.length)tsbIdx=0;
  const d=S.dhikrDefs[tsbIdx];if(!d)return;
  const c=getTsb(),cnt=c[d.id]||0;
  document.getElementById('tsbName').textContent=d.arabic;
  document.getElementById('tsbMeaning').textContent=d.meaning;
  document.getElementById('tsbCount').textContent=cnt;
  document.getElementById('tsbTarget').textContent=cnt>=d.target?'✅ Target reached':'Target: '+d.target;
  renderTsbPills();
}
function tsbTap(){
  if(tsbCustom){tsbCustomCnt++;document.getElementById('tsbCount').textContent=tsbCustomCnt;if(navigator.vibrate)navigator.vibrate(8);return;}
  const d=S.dhikrDefs[tsbIdx];if(!d)return;
  const c=getTsb();c[d.id]=(c[d.id]||0)+1;S.dhikr[d.id]=c[d.id];save();saveTsb(c);renderTsb();renderDhikr();
  if(navigator.vibrate)navigator.vibrate(8);
}
function tsbUndo(){
  if(tsbCustom){if(tsbCustomCnt>0)tsbCustomCnt--;document.getElementById('tsbCount').textContent=tsbCustomCnt;return;}
  const d=S.dhikrDefs[tsbIdx];if(!d)return;
  const c=getTsb();if((c[d.id]||0)>0){c[d.id]--;S.dhikr[d.id]=c[d.id];save();saveTsb(c);renderTsb();renderDhikr();}
}
function tsbReset(){
  if(tsbCustom){tsbCustomCnt=0;document.getElementById('tsbCount').textContent=0;return;}
  const d=S.dhikrDefs[tsbIdx];if(!d)return;
  const c=getTsb();c[d.id]=0;S.dhikr[d.id]=0;save();saveTsb(c);renderTsb();renderDhikr();
}

// CALENDAR
let calY=new Date().getFullYear(),calM=new Date().getMonth();
const CMN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const CDN=['SU','MO','TU','WE','TH','FR','SA'];
function calPrev(){calM--;if(calM<0){calM=11;calY--;}renderCal();}
function calNext(){calM++;if(calM>11){calM=0;calY++;}renderCal();}
function renderCal(){
  const h=loadHist(),today=new Date();
  // Month name + year
  document.getElementById('calMonthName').textContent=CMN[calM];
  document.getElementById('calYear').textContent=calY;
  // Stats for this month
  const daysInMonth=new Date(calY,calM+1,0).getDate();
  let allPrayed=0,anyMissed=0,partial=0;
  for(let d=1;d<=daysInMonth;d++){
    const k=calY+'-'+calM+'-'+d,r=h[k];
    if(r){if(r.pr===r.tot)allPrayed++;else if(r.mi>0)anyMissed++;else partial++;}
  }
  const statsEl=document.getElementById('calStats');
  statsEl.innerHTML=`
    <div class="cal-stat"><div class="cal-stat-val" style="color:var(--green)">${allPrayed}</div><div class="cal-stat-lbl">Full days</div></div>
    <div class="cal-stat"><div class="cal-stat-val" style="color:var(--red)">${anyMissed}</div><div class="cal-stat-lbl">Missed</div></div>
    <div class="cal-stat"><div class="cal-stat-val">${Math.round(allPrayed/(daysInMonth||1)*100)}%</div><div class="cal-stat-lbl">Completion</div></div>
  `;
  // Day labels
  const dr=document.getElementById('calDayRow');dr.innerHTML='';
  CDN.forEach(d=>{const e=document.createElement('div');e.className='cdlbl';e.textContent=d;dr.appendChild(e);});
  // Grid
  const g=document.getElementById('calGrid');g.innerHTML='';
  const fd=new Date(calY,calM,1).getDay();
  for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='cc empty';g.appendChild(e);}
  for(let d=1;d<=daysInMonth;d++){
    const k=calY+'-'+calM+'-'+d;
    const it=d===today.getDate()&&calM===today.getMonth()&&calY===today.getFullYear();
    const cell=document.createElement('div');
    const r=h[k];
    cell.className='cc'+(it?' today':'')+(r?' has-data':'');
    const num=document.createElement('div');num.className='cc-num';num.textContent=d;cell.appendChild(num);
    if(r){const dot=document.createElement('div');dot.className='cc-dot '+(r.pr===r.tot?'dg':r.mi>0?'dr':'dm');cell.appendChild(dot);}
    g.appendChild(cell);
  }
}

// JOURNAL
function loadJ(){try{return JSON.parse(localStorage.getItem(SKJ))||[];}catch{return[];}}
function saveJ(j){localStorage.setItem(SKJ,JSON.stringify(j));}
function saveJournalEntry(){
  const tx=document.getElementById('journalTextarea').value.trim();if(!tx)return;
  const now=new Date(),j=loadJ();
  j.unshift({id:Date.now(),date:ORD(now.getDate())+' '+MO[now.getMonth()]+' '+now.getFullYear(),text:tx});
  saveJ(j);document.getElementById('journalTextarea').value='';renderJ();
}
function delJEntry(id){saveJ(loadJ().filter(e=>e.id!==id));renderJ();}
function renderJ(){
  const ents=loadJ(),c=document.getElementById('journalEntries');c.innerHTML='';
  if(!ents.length){c.innerHTML='<div class="j-empty">Your reflections will appear here.</div>';return;}
  ents.forEach(e=>{
    const div=document.createElement('div');div.className='je';
    const hdr=document.createElement('div');hdr.className='je-header';
    hdr.innerHTML='<div class="je-dot"></div><div class="je-d">'+e.date+'</div>';
    const body=document.createElement('div');body.className='je-body';
    const txt=document.createElement('div');txt.className='je-t';txt.textContent=e.text;
    body.appendChild(txt);
    const ftr=document.createElement('div');ftr.className='je-footer';
    const del=document.createElement('button');del.className='je-del';del.textContent='Delete entry';del.onclick=()=>delJEntry(e.id);
    ftr.appendChild(del);
    div.appendChild(hdr);div.appendChild(body);div.appendChild(ftr);
    c.appendChild(div);
  });
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');btn.classList.add('active');
  if(name==='tasbih')renderTsb();
  if(name==='calendar')renderCal();
  if(name==='journal')renderJ();
}

let eDhikr=[];
function openDhikrModal(){eDhikr=S.dhikrDefs.map(d=>(({...d})));buildDE();document.getElementById('dhikrModal').classList.add('open');}
function closeDhikrModal(){document.getElementById('dhikrModal').classList.remove('open');}
function buildDE(){
  const c=document.getElementById('dhikrEditList');c.innerHTML='';
  eDhikr.forEach((d,i)=>{
    const it=document.createElement('div');it.className='mi';
    it.innerHTML='<label>Dhikr</label><input type="text" value="'+esc(d.arabic)+'" oninput="eDhikr['+i+'].arabic=this.value"><label>Meaning</label><input type="text" value="'+esc(d.meaning)+'" oninput="eDhikr['+i+'].meaning=this.value"><label>Target</label><input type="number" value="'+d.target+'" min="1" oninput="eDhikr['+i+'].target=parseInt(this.value)||1"><div class="mi-del"><button class="del-b" onclick="delD('+i+')">Remove</button></div>';
    c.appendChild(it);
  });
}
function addDhikrItem(){eDhikr.push({id:'dh_'+Date.now(),arabic:'',meaning:'',target:33});buildDE();}
function delD(i){eDhikr.splice(i,1);buildDE();}
function saveDhikr(){
  const v=eDhikr.filter(d=>d.arabic.trim());S.dhikrDefs=v;
  v.forEach(d=>{if(S.dhikr[d.id]===undefined)S.dhikr[d.id]=0;});
  save();renderDhikr();closeDhikrModal();
}
let eTasks=[];
function openTaskModal(){eTasks=S.taskDefs.map(t=>(({...t})));buildTE();document.getElementById('taskModal').classList.add('open');}
function closeTaskModal(){document.getElementById('taskModal').classList.remove('open');}
function buildTE(){
  const c=document.getElementById('taskEditList');c.innerHTML='';
  eTasks.forEach((t,i)=>{
    const it=document.createElement('div');it.className='mi';
    it.innerHTML='<label>Task</label><input type="text" value="'+esc(t.label)+'" oninput="eTasks['+i+'].label=this.value"><div class="mi-del"><button class="del-b" onclick="delT('+i+')">Remove</button></div>';
    c.appendChild(it);
  });
}
function addTaskItem(){eTasks.push({id:'task_'+Date.now(),label:''});buildTE();}
function delT(i){eTasks.splice(i,1);buildTE();}
function saveTasksModal(){
  const v=eTasks.filter(t=>t.label.trim());S.taskDefs=v;
  v.forEach(t=>{if(S.tasks[t.id]===undefined)S.tasks[t.id]=false;});
  save();renderTasks();closeTaskModal();
}

function showConfirm(){document.getElementById('confirmBox').classList.add('vis');}
function hideConfirm(){document.getElementById('confirmBox').classList.remove('vis');}
function doReset(){
  const n={},dh={},tk={};
  NL.forEach(x=>n[x.id]='pending');S.dhikrDefs.forEach(x=>dh[x.id]=0);S.taskDefs.forEach(x=>tk[x.id]=false);
  S.namaz=n;S.dhikr=dh;S.tasks=tk;save();renderAll();hideConfirm();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.getElementById('dhikrModal').addEventListener('click',function(e){if(e.target===this)closeDhikrModal();});
document.getElementById('taskModal').addEventListener('click',function(e){if(e.target===this)closeTaskModal();});

setQuote();renderAll();renderJ();renderCal();initPT();
setInterval(()=>{updateHeader();midCheck();cdUpdate();},1000);
setInterval(()=>{if(ptOK)renderNamaz();},60000);
</script>
